<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>能源消费分析 - 国家级绿色工厂能源管理平台</title>
    <link rel="stylesheet" href="https://unpkg.com/@arco-design/web-react@latest/dist/css/arco.min.css">
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif; background-color: #f5f7fa; color: #333; }
        .container { max-width: 1400px; margin: 0 auto; padding: 20px; }
        .header { background: linear-gradient(135deg, #1e80ff 0%, #0e5fd8 100%); color: white; padding: 25px 30px; border-radius: 8px; margin-bottom: 20px; }
        .header-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .header h1 { font-size: 2rem; font-weight: 600; }
        .back-btn { background: rgba(255, 255, 255, 0.2); color: white; border: none; padding: 8px 16px; border-radius: 4px; cursor: pointer; text-decoration: none; }
        
        .energy-structure { background: white; border-radius: 8px; padding: 20px; margin-bottom: 20px; box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1); }
        .structure-title { font-size: 1.2rem; font-weight: 600; margin-bottom: 15px; }
        
        .analysis-layout { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px; }
        .analysis-section { background: white; border-radius: 8px; padding: 20px; box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1); }
        
        .anomaly-list { max-height: 300px; overflow-y: auto; }
        .anomaly-item { padding: 15px; border: 1px solid #f0f0f0; border-radius: 6px; margin-bottom: 10px; }
        .anomaly-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
        .anomaly-type { font-weight: 600; }
        .anomaly-time { color: #666; font-size: 0.9rem; }
        .anomaly-details { color: #666; font-size: 0.9rem; }
        .anomaly-status { padding: 4px 8px; border-radius: 4px; font-size: 0.8rem; }
        .status-pending { background: #fff7e6; color: #ff7d00; }
        .status-processing { background: #e6f7ff; color: #1e80ff; }
        .status-resolved { background: #f6ffed; color: #52c41a; }
        
        .efficiency-radar { height: 300px; }
        .strategy-cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 15px; }
        .strategy-card { padding: 15px; border: 1px solid #f0f0f0; border-radius: 6px; }
        .strategy-title { font-weight: 600; margin-bottom: 8px; }
        .strategy-desc { color: #666; font-size: 0.9rem; margin-bottom: 10px; }
        
        .btn { padding: 8px 16px; border: none; border-radius: 4px; cursor: pointer; transition: all 0.3s; }
        .btn-primary { background: #1e80ff; color: white; }
        .btn-secondary { background: #f0f0f0; color: #666; }
        
        @media (max-width: 768px) {
            .analysis-layout { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="header-top">
                <h1>📈 能源消费分析模块</h1>
                <a href="index.html" class="back-btn">← 返回首页</a>
            </div>
            <p>能耗结构分析、趋势预测、异常检测、能效诊断与优化建议</p>
        </div>
        
        <!-- 能源结构分析 -->
        <div class="energy-structure">
            <div class="structure-title">能源结构占比分析</div>
            <div id="structure-chart" style="height: 400px;"></div>
        </div>
        
        <!-- 分析布局 -->
        <div class="analysis-layout">
            <!-- 左侧：异常事件 -->
            <div class="analysis-section">
                <div class="structure-title">异常事件时间轴</div>
                <div class="anomaly-list">
                    <div class="anomaly-item">
                        <div class="anomaly-header">
                            <div class="anomaly-type">能耗突增</div>
                            <div class="anomaly-time">2025-06-12 09:15</div>
                        </div>
                        <div class="anomaly-details">一车间空压机 - 功率因数异常 (0.65)</div>
                        <div style="display: flex; justify-content: space-between; align-items: center; margin-top: 10px;">
                            <span class="anomaly-status status-pending">未处理</span>
                            <button class="btn btn-secondary">查看详情</button>
                        </div>
                    </div>
                    
                    <div class="anomaly-item">
                        <div class="anomaly-header">
                            <div class="anomaly-type">设备异常</div>
                            <div class="anomaly-time">2025-06-12 08:45</div>
                        </div>
                        <div class="anomaly-details">二车间锅炉 - 温度异常 (285℃)</div>
                        <div style="display: flex; justify-content: space-between; align-items: center; margin-top: 10px;">
                            <span class="anomaly-status status-processing">处理中</span>
                            <button class="btn btn-secondary">查看详情</button>
                        </div>
                    </div>
                    
                    <div class="anomaly-item">
                        <div class="anomaly-header">
                            <div class="anomaly-type">数据缺失</div>
                            <div class="anomaly-time">2025-06-12 08:30</div>
                        </div>
                        <div class="anomaly-details">三车间冷却塔 - 数据采集中断</div>
                        <div style="display: flex; justify-content: space-between; align-items: center; margin-top: 10px;">
                            <span class="anomaly-status status-resolved">已解决</span>
                            <button class="btn btn-secondary">查看详情</button>
                        </div>
                    </div>
                </div>
                
                <div style="margin-top: 15px; text-align: right;">
                    <button class="btn btn-secondary">标记为已处理</button>
                    <button class="btn btn-secondary">忽略异常</button>
                    <button class="btn btn-primary">转交工单</button>
                </div>
            </div>
            
            <!-- 右侧：能效分析 -->
            <div class="analysis-section">
                <div class="structure-title">能效雷达图分析</div>
                <div id="radar-chart" class="efficiency-radar"></div>
                
                <div class="structure-title" style="margin-top: 20px;">智能策略推荐</div>
                <div class="strategy-cards">
                    <div class="strategy-card">
                        <div class="strategy-title">空压机优化</div>
                        <div class="strategy-desc">建议调整空压机运行参数，预计节能5-8%</div>
                        <button class="btn btn-primary">查看方案</button>
                    </div>
                    <div class="strategy-card">
                        <div class="strategy-title">锅炉效率提升</div>
                        <div class="strategy-desc">优化燃烧控制，预计提升热效率3%</div>
                        <button class="btn btn-primary">查看方案</button>
                    </div>
                </div>
            </div>
        </div>
        
        <!-- 诊断报告生成 -->
        <div style="text-align: center; margin-top: 20px;">
            <button class="btn btn-primary" style="padding: 12px 24px;">生成诊断报告</button>
        </div>
    </div>

    <script src="https://unpkg.com/@arco-design/web-react@latest/dist/arco.development.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            // 能源结构旭日图
            const structureChart = echarts.init(document.getElementById('structure-chart'));
            structureChart.setOption({
                tooltip: {
                    trigger: 'item',
                    formatter: '{a} <br/>{b}: {c} ({d}%)'
                },
                series: {
                    name: '能源结构',
                    type: 'sunburst',
                    radius: ['15%', '80%'],
                    data: [
                        {
                            name: '全厂能耗',
                            value: 12568,
                            children: [
                                {
                                    name: '电力',
                                    value: 8245,
                                    children: [
                                        { name: '一车间', value: 3245 },
                                        { name: '二车间', value: 2856 },
                                        { name: '三车间', value: 2144 }
                                    ]
                                },
                                {
                                    name: '天然气',
                                    value: 2456,
                                    children: [
                                        { name: '锅炉房', value: 1856 },
                                        { name: '食堂', value: 600 }
                                    ]
                                },
                                {
                                    name: '蒸汽',
                                    value: 1711,
                                    children: [
                                        { name: '生产工艺', value: 1211 },
                                        { name: '采暖', value: 500 }
                                    ]
                                },
                                { name: '水', value: 156 }
                            ]
                        }
                    ],
                    label: {
                        rotate: 'radial'
                    }
                }
            });
            
            // 能效雷达图
            const radarChart = echarts.init(document.getElementById('radar-chart'));
            radarChart.setOption({
                tooltip: {},
                radar: {
                    indicator: [
                        { name: '设备效率', max: 100 },
                        { name: '能源利用率', max: 100 },
                        { name: '运行稳定性', max: 100 },
                        { name: '维护及时性', max: 100 },
                        { name: '节能潜力', max: 100 }
                    ]
                },
                series: [{
                    type: 'radar',
                    data: [
                        {
                            value: [85, 78, 92, 76, 65],
                            name: '当前能效',
                            areaStyle: {}
                        },
                        {
                            value: [95, 88, 96, 85, 80],
                            name: '行业标杆'
                        }
                    ]
                }]
            });
            
            window.addEventListener('resize', function() {
                structureChart.resize();
                radarChart.resize();
            });
        });
    </script>
</body>
</html>
