<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>能流分析模块 - 国家级绿色工厂能源管理平台</title>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif; background-color: #f0f2f5; color: #333; }
        .container { max-width: 1920px; margin: 0 auto; padding: 20px; width: 100%; }
        .header { background: linear-gradient(135deg, #14c9c9 0%, #0ea5a5 100%); color: white; padding: 28px 32px; border-radius: 12px; margin-bottom: 20px; box-shadow: 0 4px 16px rgba(20, 201, 201, 0.25); }
        .header-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
        .header h1 { font-size: 2rem; font-weight: 600; }
        .header p { font-size: 1rem; opacity: 0.92; }
        .selector-bar { background: white; padding: 16px 24px; border-radius: 10px; margin-bottom: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.06); display: flex; align-items: center; gap: 20px; flex-wrap: wrap; }
        .selector-group { display: flex; align-items: center; gap: 8px; }
        .selector-label { font-weight: 600; color: #555; font-size: 0.9rem; white-space: nowrap; }
        .selector-btn { padding: 8px 18px; border: 1px solid #d9d9d9; background: white; border-radius: 6px; cursor: pointer; font-size: 0.9rem; transition: all 0.2s; white-space: nowrap; }
        .selector-btn:hover { border-color: #14c9c9; color: #14c9c9; }
        .selector-btn.active { background: #14c9c9; color: white; border-color: #14c9c9; }
        .selector-divider { width: 1px; height: 24px; background: #e8e8e8; }
        .selector-select { padding: 8px 14px; border: 1px solid #d9d9d9; border-radius: 6px; font-size: 0.9rem; cursor: pointer; background: white; min-width: 100px; }
        .selector-select:focus { border-color: #14c9c9; outline: none; }
        .kpi-section { display: grid; grid-template-columns: repeat(6, 1fr); gap: 16px; margin-bottom: 20px; }
        .kpi-card { background: white; padding: 28px 16px; border-radius: 10px; box-shadow: 0 2px 8px rgba(0,0,0,0.06); text-align: center; border-top: 4px solid #14c9c9; transition: transform 0.2s; cursor: default; overflow: visible; min-height: 140px; display: flex; flex-direction: column; justify-content: center; }
        .kpi-card:hover { transform: translateY(-2px); box-shadow: 0 4px 16px rgba(0,0,0,0.1); }
        .kpi-card:nth-child(2) { border-top-color: #1e80ff; }
        .kpi-card:nth-child(3) { border-top-color: #ff7d00; }
        .kpi-card:nth-child(4) { border-top-color: #f53f3f; }
        .kpi-card:nth-child(5) { border-top-color: #00b42a; }
        .kpi-card:nth-child(6) { border-top-color: #722ed1; }
        .kpi-value { font-size: 1.8rem; font-weight: 700; color: #14c9c9; margin-bottom: 4px; line-height: 1.3; }
        .kpi-card:nth-child(2) .kpi-value { color: #1e80ff; }
        .kpi-card:nth-child(3) .kpi-value { color: #ff7d00; }
        .kpi-card:nth-child(4) .kpi-value { color: #f53f3f; }
        .kpi-card:nth-child(5) .kpi-value { color: #00b42a; }
        .kpi-card:nth-child(6) .kpi-value { color: #722ed1; }
        .kpi-label { color: #666; font-size: 0.85rem; font-weight: 500; margin-bottom: 6px; line-height: 1.4; }
        .kpi-unit { color: #999; font-size: 0.78rem; line-height: 1.4; }
        .kpi-sub { font-size: 0.8rem; color: #999; margin-top: 4px; line-height: 1.4; }
        .charts-row { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px; }
        .chart-panel { background: white; padding: 20px 24px; border-radius: 10px; box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
        .chart-panel-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
        .chart-panel-title { font-size: 1.05rem; font-weight: 600; color: #333; display: flex; align-items: center; gap: 8px; }
        .chart-tabs { display: flex; gap: 4px; }
        .chart-tab { padding: 4px 12px; border: 1px solid #d9d9d9; background: white; border-radius: 4px; cursor: pointer; font-size: 0.8rem; transition: all 0.2s; }
        .chart-tab.active { background: #14c9c9; color: white; border-color: #14c9c9; }
        .chart-box { height: 580px; }
        .chart-box-lg { height: 620px; }
        .section-panel { background: white; border-radius: 10px; box-shadow: 0 2px 8px rgba(0,0,0,0.06); margin-bottom: 20px; overflow: hidden; }
        .section-panel-header { padding: 18px 24px; border-bottom: 1px solid #f0f0f0; display: flex; justify-content: space-between; align-items: center; }
        .section-panel-title { font-size: 1.05rem; font-weight: 600; color: #333; display: flex; align-items: center; gap: 8px; }
        .section-panel-actions { display: flex; gap: 8px; }
        .btn { padding: 8px 16px; border: none; border-radius: 6px; cursor: pointer; font-size: 0.85rem; font-weight: 500; transition: all 0.2s; }
        .btn-sm { padding: 4px 10px; font-size: 0.8rem; }
        .btn-primary { background: #14c9c9; color: white; }
        .btn-primary:hover { background: #0ea5a5; }
        .btn-outline { background: white; color: #14c9c9; border: 1px solid #14c9c9; }
        .btn-outline:hover { background: #e6fffe; }
        .btn-ghost { background: transparent; color: #666; border: 1px solid #d9d9d9; }
        .btn-ghost:hover { border-color: #14c9c9; color: #14c9c9; }
        .table-wrap { overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; }
        table th, table td { padding: 12px 16px; text-align: left; border-bottom: 1px solid #f0f0f0; font-size: 0.9rem; }
        table th { background: #fafafa; font-weight: 600; color: #666; white-space: nowrap; }
        table tbody tr:hover { background: #f8f9fa; }
        .text-right { text-align: right; }
        .text-center { text-align: center; }
        .text-green { color: #00b42a; font-weight: 600; }
        .text-blue { color: #1e80ff; font-weight: 600; }
        .text-orange { color: #ff7d00; font-weight: 600; }
        .text-red { color: #f53f3f; font-weight: 600; }
        .text-muted { color: #999; }
        .fw-600 { font-weight: 600; }
        .row-total { background: #e6fffe; font-weight: 700; }
        .tag { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 0.75rem; font-weight: 600; }
        .tag-green { background: #e8ffea; color: #00b42a; }
        .tag-red { background: #fff2f0; color: #f53f3f; }
        .tag-orange { background: #fff7e6; color: #ff7d00; }
        .tag-blue { background: #e8f3ff; color: #1e80ff; }
        .loss-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; padding: 20px 24px; }
        .loss-card { padding: 20px; background: #fafafa; border-radius: 8px; border-left: 4px solid #f53f3f; }
        .loss-card:nth-child(2) { border-left-color: #ff7d00; }
        .loss-card:nth-child(3) { border-left-color: #1e80ff; }
        .loss-card:nth-child(4) { border-left-color: #722ed1; }
        .loss-label { font-weight: 600; color: #333; margin-bottom: 8px; font-size: 0.95rem; }
        .loss-value { font-size: 1.6rem; font-weight: 700; color: #f53f3f; margin-bottom: 4px; }
        .loss-card:nth-child(2) .loss-value { color: #ff7d00; }
        .loss-card:nth-child(3) .loss-value { color: #1e80ff; }
        .loss-card:nth-child(4) .loss-value { color: #722ed1; }
        .loss-desc { color: #666; font-size: 0.85rem; line-height: 1.5; }
        .meter-map { padding: 20px 24px; font-family: 'Courier New', Consolas, monospace; font-size: 0.8rem; line-height: 1.8; color: #333; background: #fafafa; border-radius: 6px; margin: 16px 24px; white-space: pre-wrap; overflow-x: auto; }
        @media (max-width: 1400px) { .kpi-section { grid-template-columns: repeat(3, 1fr); } .charts-row { grid-template-columns: 1fr; } .loss-grid { grid-template-columns: repeat(2, 1fr); } }
        @media (min-width: 2560px) {
            .container { max-width: 3440px; padding: 30px; }
            .header { padding: 32px 40px; }
            .header h1 { font-size: 2.2rem; }
            .header p { font-size: 1.1rem; }
            .kpi-section { grid-template-columns: repeat(8, 1fr); gap: 20px; }
            .kpi-card { min-height: 150px; padding: 32px 20px; }
            .kpi-value { font-size: 2rem; }
            .charts-row { grid-template-columns: 1fr 1fr 1fr; gap: 24px; }
            .chart-panel { padding: 24px 30px; }
            .chart-box { height: 550px; }
            .chart-box-lg { height: 650px; }
            .loss-grid { grid-template-columns: repeat(4, 1fr); }
            .section-panel { border-radius: 12px; }
            .section-panel-header { padding: 20px 30px; }
            table th, table td { padding: 12px 16px; font-size: 0.95rem; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="header-top">
                <h1>🔄 能流分析模块</h1>

            </div>
            <p>可视化能源流动过程 | 基地级电表/蒸汽表/水表/燃气表多级计量网络 | 精准识别能量损失环节 | 贵州基地</p>
        </div>
        <div class="selector-bar">
            <div class="selector-group">
                <span class="selector-label">📅 年度：</span>
                <button class="selector-btn active" data-year="2025" onclick="switchYear('2025')">2025年</button>
                <button class="selector-btn" data-year="2026" onclick="switchYear('2026')">2026年</button>
            </div>
            <div class="selector-divider"></div>
            <div class="selector-group">
                <span class="selector-label">月份：</span>
                <select class="selector-select" id="monthSelect" onchange="switchMonth()">
                    <option value="all">全年累计</option>
                    <option value="1">1月</option><option value="2">2月</option><option value="3">3月</option>
                    <option value="4">4月</option><option value="5">5月</option><option value="6">6月</option>
                    <option value="7">7月</option><option value="8">8月</option><option value="9">9月</option>
                    <option value="10">10月</option><option value="11">11月</option><option value="12">12月</option>
                </select>
            </div>
            <div class="selector-divider"></div>
            <div class="selector-group" id="sankeyModeGroup">
                <span class="selector-label">能流类型：</span>
                <button class="selector-btn active" data-mode="electricity" onclick="switchSankeyMode('electricity', this)">⚡ 电力</button>
                <button class="selector-btn" data-mode="steam" onclick="switchSankeyMode('steam', this)">♨️ 蒸汽</button>
                <button class="selector-btn" data-mode="water" onclick="switchSankeyMode('water', this)">💧 水</button>
                <button class="selector-btn" data-mode="gas" onclick="switchSankeyMode('gas', this)">🔥 燃气</button>
            </div>
        </div>
        <div class="kpi-section" id="kpiSection"></div>
        <div class="section-panel">
            <div class="section-panel-header">
                <div class="section-panel-title">🔀 能流桑基图（Sankey）— 能源从输入到终端消耗的全路径可视化</div>
                <div class="section-panel-actions">
                    <button class="btn btn-ghost btn-sm" onclick="resetSankeyZoom()">重置视图</button>
                    <button class="btn btn-outline btn-sm" onclick="exportSankeyAsImage()">导出图片</button>
                </div>
            </div>
            <div class="chart-box-lg" id="sankeyChart"></div>
        </div>
        <div class="charts-row">
            <div class="chart-panel">
                <div class="chart-panel-header">
                    <div class="chart-panel-title">⚡ 电力三级能流（总表→分表→设备）</div>
                </div>
                <div class="chart-box-lg" id="elecSankeyChart"></div>
            </div>
            <div class="chart-panel">
                <div class="chart-panel-header">
                    <div class="chart-panel-title">⚠️ 各环节能量损失分析（折标煤）</div>
                </div>
                <div class="chart-box" id="lossChart"></div>
            </div>
        </div>
        <div class="section-panel">
            <div class="section-panel-header">
                <div class="section-panel-title">📊 基地计量表层级结构表</div>
                <div class="section-panel-actions">
                    <button class="btn btn-outline btn-sm" onclick="exportTable('meterTable')">导出CSV</button>
                </div>
            </div>
            <div class="table-wrap">
                <table id="meterTable">
                    <thead>
                        <tr>
                            <th>能源类型</th><th>区域类型</th><th>一级总表</th><th>二级分表</th>
                            <th>三级子表</th><th>本期用量</th><th>占比</th><th>折标煤(tce)</th>
                        </tr>
                    </thead>
                    <tbody id="meterBody"></tbody>
                </table>
            </div>
        </div>
        <div class="section-panel">
            <div class="section-panel-header">
                <div class="section-panel-title">🔎 能源损失环节定位</div>
            </div>
            <div class="loss-grid" id="lossGrid"></div>
        </div>
    </div>
    <script>
        const RAW_DATA = {
            '2025': { production: { months: ['1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'], actualOutput: [4274.6653,2902.1028,3486.0048,1707.0695,3063.5683,3584.5896,2034.9612,3025.3746,3401.2965,2177.4818,2708.5219,3603.3521] }, water: [17386,12949,15143,6768,12579,14614,8813,12421,13803,9131,11312,15117], steam: [1712,1126,1292,574,1061,1186,669,1009,1125,750,954,1269], electricity: [345621,252416.4,290533.2,159854,281599.68,320937.2,211425.8,282957.8,302547.4,210993.6,236026.8,288701] },
            '2026': { production: { months: ['1月','2月','3月','4月'], actualOutput: [4945.632,2834.961,4416.6993,2387.1303] }, water: [20543,12165,18367,10380], steam: [1740,1020,1532,823], electricity: [374779.4,227895.6,345636.8,189917.2] }
        };
        const COEF = { electricity: 0.1229 / 1000, water: 0.0857 / 1000, steam: 0.1000 };
        let currentYear = '2025', currentMonth = 'all', sankeyMode = 'electricity';
        let sankeyChartInst = null, elecSankeyInst = null, lossChartInst = null;

        function getData() { return RAW_DATA[currentYear]; }
        function getMonthCount() { return getData().water.length; }
        function sum(arr) { return arr.reduce((a, b) => a + b, 0); }
        function fmt(n, d) { d = d || 2; return Number(n).toFixed(d); }
        function fmtNum(n, d) { d = d || 2; const v = Number(n).toFixed(d); return parseFloat(v).toLocaleString('en-US', { minimumFractionDigits: d, maximumFractionDigits: d }); }
        function getMonthlyValues(key) { const d = getData(); return currentMonth === 'all' ? d[key] : [d[key][parseInt(currentMonth) - 1]]; }
        function getMonthlySum(key) { return sum(getMonthlyValues(key)); }

        function switchYear(year) {
            currentYear = year;
            document.querySelectorAll('[data-year]').forEach(b => b.classList.remove('active'));
            document.querySelector('[data-year="' + year + '"]').classList.add('active');
            const sel = document.getElementById('monthSelect'), mc = getMonthCount();
            for (let i = 5; i <= 12; i++) { const opt = sel.querySelector('option[value="' + i + '"]'); if (opt) opt.disabled = i > mc; }
            if (parseInt(currentMonth) > mc && currentMonth !== 'all') { currentMonth = 'all'; sel.value = 'all'; }
            refreshAll();
        }
        function switchMonth() { currentMonth = document.getElementById('monthSelect').value; refreshAll(); }
        function switchSankeyMode(mode, btn) {
            sankeyMode = mode;
            document.querySelectorAll('#sankeyModeGroup .selector-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            renderSankeyChart();
        }
        function refreshAll() { renderKPIs(); renderSankeyChart(); renderElecSankeyChart(); renderLossChart(); renderMeterTable(); renderLossGrid(); }

        function renderKPIs() {
            const tE = getMonthlySum('electricity'), tW = getMonthlySum('water'), tS = getMonthlySum('steam');
            const tTce = tE * COEF.electricity + tW * COEF.water + tS * COEF.steam;
            const sLoss = tS * 0.0574, eLoss = tE * 0.04;
            const eff = tTce > 0 ? ((tTce - (eLoss * COEF.electricity + sLoss * COEF.steam)) / tTce * 100) : 0;
            const cards = [
                { v: fmtNum(tTce, 2), l: '基地综合能耗输入', u: 'tce', s: '一车间全能源折标煤', c: '#14c9c9' },
                { v: fmtNum(eff, 1) + '%', l: '能源综合利用率', u: '', s: '', c: '#1e80ff' },
                { v: fmtNum(tS, 0), l: '蒸汽总流量', u: 't', s: '蒸汽总表', c: '#ff7d00' },
                { v: fmtNum(sLoss, 0), l: '蒸汽管网损耗', u: 't', s: '损耗率 5.74%', c: '#f53f3f' },
                { v: fmtNum(tE / 10000, 2), l: '基地电力总输入', u: '万kWh', s: '基地总表1', c: '#00b42a' },
                { v: fmtNum(tW, 0), l: '基地用水总量', u: 'm³', s: '三栋厂房合计', c: '#722ed1' }
            ];
            document.getElementById('kpiSection').innerHTML = cards.map(c => '<div class="kpi-card" style="border-top-color:' + c.c + '"><div class="kpi-value" style="color:' + c.c + '">' + c.v + '</div><div class="kpi-label">' + c.l + '</div><div class="kpi-unit">' + c.u + '</div>' + (c.s ? '<div class="kpi-sub">' + c.s + '</div>' : '') + '</div>').join('');
        }

        function renderSankeyChart() {
            const dom = document.getElementById('sankeyChart'); if (!dom) return;
            if (sankeyChartInst) sankeyChartInst.dispose();
            const chart = echarts.init(dom); sankeyChartInst = chart;
            const tE = getMonthlySum('electricity'), tW = getMonthlySum('water'), tS = getMonthlySum('steam');
            const lblE = '⚡ 电力输入\n' + fmtNum(tE / 10000, 1) + '万kWh';
            const lblS = '♨️ 蒸汽输入\n' + fmtNum(tS, 0) + 't';
            const lblW = '💧 自来水输入\n' + fmtNum(tW, 0) + 'm³';
            const lblG = '🔥 天然气输入';
            let data, links;
            
            if (sankeyMode === 'electricity') {
                // 一级总表 -> 二级分表 -> 三级子表
                const prod1 = tE * 0.22, prod2 = tE * 0.22, pl = tE * 0.08, zs = tE * 0.05;
                const ky = tE * 0.06, gl = tE * 0.04, k3 = tE * 0.025, k2 = tE * 0.025, k1 = tE * 0.02, k9 = tE * 0.01;
                const ws2 = tE * 0.025, ws = tE * 0.015, wx = tE * 0.01, cd = tE * 0.005, xf = tE * 0.02;
                
                // 三级子表设备
                const devRatio = [0.025, 0.030, 0.022, 0.018, 0.028, 0.035, 0.020, 0.015, 0.012, 0.010];
                const devNames = ['灌装机', '输送线体', 'APV', '热缩机', '冷却机', '烘炉', '包装机', '冷却塔', '码垛机', '卸垛机'];
                
                data = [
                    // 能源输入
                    { name: lblE, itemStyle: { color: '#1e80ff' } },
                    // 一级总表
                    { name: '【一级】基地总表1', itemStyle: { color: '#722ed1' } },
                    // 二级分表 - 生产系统
                    { name: '【二级】生产系统-1线', itemStyle: { color: '#00b42a' } },
                    { name: '【二级】生产系统-2线', itemStyle: { color: '#14c9c9' } },
                    { name: '【二级】生产系统-配料', itemStyle: { color: '#ff7d00' } },
                    { name: '【二级】生产系统-制水', itemStyle: { color: '#ffa940' } },
                    // 二级分表 - 辅助系统
                    { name: '【二级】辅助-空压机', itemStyle: { color: '#f53f3f' } },
                    { name: '【二级】辅助-锅炉', itemStyle: { color: '#f7ba1e' } },
                    { name: '【二级】辅助-中央空调', itemStyle: { color: '#36cfc9' } },
                    { name: '【二级】辅助-污水处理', itemStyle: { color: '#b37feb' } },
                    { name: '【二级】辅助-维修间', itemStyle: { color: '#ffadd2' } },
                    { name: '【二级】辅助-充电桩', itemStyle: { color: '#86909c' } },
                    { name: '【二级】消防/通风', itemStyle: { color: '#d3adf7' } },
                    // 三级子表 - 1线设备
                    { name: '【三级】1线-灌装机' }, { name: '【三级】1线-输送线体' }, { name: '【三级】1线-APV' },
                    { name: '【三级】1线-热缩机' }, { name: '【三级】1线-冷却机' }, { name: '【三级】1线-烘炉' },
                    { name: '【三级】1线-包装机' }, { name: '【三级】1线-冷却塔' }, { name: '【三级】1线-码垛机' },
                    { name: '【三级】1线-卸垛机' },
                    // 三级子表 - 2线设备
                    { name: '【三级】2线-灌装机' }, { name: '【三级】2线-输送线体' }, { name: '【三级】2线-APV' },

                { type: '水表', area: '生产区', l1: '15栋厂房-自来水', l2: '15栋香精房消防用水', l3: '-', val: tW * 0.22 * 0.20, ratio: 4.4, tce: tW * 0.22 * 0.20 * COEF.water },
                { type: '水表', area: '办公区', l1: '15栋厂房-自来水', l2: '15栋行政办公室', l3: '-', val: tW * 0.22 * 0.45, ratio: 9.9, tce: tW * 0.22 * 0.45 * COEF.water },
                { type: '水表', area: '生产区', l1: '16栋厂房-自来水', l2: '16栋车间-自来水', l3: '-', val: tW * 0.23 * 0.5, ratio: 11.5, tce: tW * 0.23 * 0.5 * COEF.water },
                { type: '水表', area: '生产区', l1: '16栋厂房-自来水', l2: '16栋卫生间-自来水', l3: '-', val: tW * 0.23 * 0.2, ratio: 4.6, tce: tW * 0.23 * 0.2 * COEF.water },
                { type: '水表', area: '办公区', l1: '16栋厂房-自来水', l2: '16栋综合办公室-自来水', l3: '-', val: tW * 0.23 * 0.3, ratio: 6.9, tce: tW * 0.23 * 0.3 * COEF.water },
                { type: '水表', area: '生产区', l1: '30栋制水车间-自来水', l2: '制水间-自来水', l3: '配料间-RO水', val: tW * 0.55 * 0.35, ratio: 19.25, tce: tW * 0.55 * 0.35 * COEF.water },
                { type: '水表', area: '生产区', l1: '30栋制水车间-自来水', l2: '制水间-自来水', l3: '锅炉间-RO水', val: tW * 0.55 * 0.35, ratio: 19.25, tce: tW * 0.55 * 0.35 * COEF.water },
                { type: '水表', area: '生产区', l1: '30栋制水车间-自来水', l2: '制水间-自来水', l3: '浓水', val: tW * 0.55 * 0.20, ratio: 11, tce: tW * 0.55 * 0.20 * COEF.water },
                { type: '水表', area: '生产区', l1: '30栋制水车间-自来水', l2: '30栋培训室-自来水', l3: '-', val: tW * 0.55 * 0.10, ratio: 5.5, tce: tW * 0.55 * 0.10 * COEF.water },
                { type: '燃气表', area: '生产区', l1: '燃气总表', l2: '1号锅炉', l3: '-', val: null, ratio: null, tce: null },
                { type: '燃气表', area: '生产区', l1: '燃气总表', l2: '2号锅炉', l3: '-', val: null, ratio: null, tce: null }
            ];
            let html = '';
            rows.forEach(r => {
                html += '<tr>';
                html += '<td><span class="tag tag-blue">' + r.type + '</span></td>';
                html += '<td>' + r.area + '</td>';
                html += '<td class="fw-600">' + r.l1 + '</td>';
                html += '<td>' + r.l2 + '</td>';
                html += '<td' + (r.l3 === '-' ? ' class="text-muted"' : '') + '>' + r.l3 + '</td>';
                html += '<td class="text-right">' + (r.val != null ? fmtNum(r.val, 0) : '-') + '</td>';
                html += '<td class="text-right">' + (r.ratio != null ? fmtNum(r.ratio, 1) + '%' : '-') + '</td>';
                html += '<td class="text-right text-green">' + (r.tce != null ? fmtNum(r.tce, 2) : '-') + '</td>';
                html += '</tr>';
            });
            document.getElementById('meterBody').innerHTML = html;
        }

        function renderLossGrid() {
            const tS = getMonthlySum('steam'), tE = getMonthlySum('electricity');
            const items = [
                { label: '蒸汽管网散热损失', value: fmtNum(tS * 0.0574, 0) + ' t', desc: '损耗率5.74%，主要因管道保温老化、疏水阀泄漏。建议：排查全厂疏水阀、更换破损保温层' },
                { label: '电力变压器及线损', value: fmtNum(tE * 0.04 / 10000, 2) + ' 万kWh', desc: '线损率约4%，主要因变压器空载损耗及低压线路长距离输送。建议：优化变压器负载率' },
                { label: '锅炉排烟热损失', value: fmtNum(tS * 0.08, 0) + ' t（蒸汽当量）', desc: '排烟温度偏高，余热未回收。建议：加装烟气余热回收装置，用于锅炉补水预热' },
                { label: '空压机系统散热损失', value: fmtNum(tE * 0.06 * 0.15 / 10000, 2) + ' 万kWh', desc: '压缩过程产生大量热能未利用。建议：回收空压机余热用于车间供暖或热水' }
            ];
            document.getElementById('lossGrid').innerHTML = items.map(item =>
                '<div class="loss-card">' +
                '<div class="loss-label">' + item.label + '</div>' +
                '<div class="loss-value">' + item.value + '</div>' +
                '<div class="loss-desc">' + item.desc + '</div>' +
                '</div>'
            ).join('');
        }

        function exportTable(tableId) {
            const table = document.getElementById(tableId);
            let csv = '\uFEFF';
            table.querySelectorAll('tr').forEach(row => {
                const rowData = [];
                row.querySelectorAll('th, td').forEach(col => {
                    rowData.push('"' + col.textContent.trim().replace(/"/g, '""') + '"');
                });
                csv += rowData.join(',') + '\n';
            });
            const a = document.createElement('a');
            a.href = URL.createObjectURL(new Blob([csv], { type: 'text/csv;charset=utf-8;' }));
            a.download = tableId + '_' + currentYear + '_' + (currentMonth === 'all' ? '全年' : currentMonth + '月') + '.csv';
            a.click();
        }

        document.addEventListener('DOMContentLoaded', function() { refreshAll(); });
    </script>
</body>
