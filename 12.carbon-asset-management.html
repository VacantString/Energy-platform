<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>碳资产管理 - 国家级绿色工厂能源管理平台</title>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'Helvetica Neue',Arial,sans-serif;background:#f0f2f5;color:#333}.container{max-width:1920px;margin:0 auto;padding:20px}
        .header{background:linear-gradient(135deg,#1e80ff 0%,#0e5fd8 100%);color:white;padding:28px 32px;border-radius:12px;margin-bottom:20px;box-shadow:0 4px 16px rgba(30,128,255,0.25)}.header-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}.header h1{font-size:2rem;font-weight:600}.header p{font-size:1rem;opacity:0.92}
        .selector-bar{background:white;padding:16px 24px;border-radius:10px;margin-bottom:20px;box-shadow:0 2px 8px rgba(0,0,0,0.06);display:flex;align-items:center;gap:20px;flex-wrap:wrap}.selector-group{display:flex;align-items:center;gap:8px}.selector-label{font-weight:600;color:#555;font-size:0.9rem}.selector-btn{padding:8px 18px;border:1px solid #d9d9d9;background:white;border-radius:6px;cursor:pointer;font-size:0.9rem;transition:all 0.2s}.selector-btn:hover{border-color:#1e80ff;color:#1e80ff}.selector-btn.active{background:#1e80ff;color:white;border-color:#1e80ff}.selector-divider{width:1px;height:24px;background:#e8e8e8}.selector-select{padding:8px 14px;border:1px solid #d9d9d9;border-radius:6px;font-size:0.9rem;cursor:pointer;background:white;min-width:100px}.selector-select:focus{border-color:#1e80ff;outline:none}
        .kpi-section{display:grid;grid-template-columns:repeat(6,1fr);gap:16px;margin-bottom:20px}.kpi-card{background:white;padding:28px 16px;border-radius:10px;box-shadow:0 2px 8px rgba(0,0,0,0.06);text-align:center;border-top:4px solid #1e80ff;transition:transform 0.2s;overflow:visible;min-height:140px;display:flex;flex-direction:column;justify-content:center}.kpi-card:hover{transform:translateY(-2px)}.kpi-card:nth-child(2){border-top-color:#00b42a}.kpi-card:nth-child(3){border-top-color:#ff7d00}.kpi-card:nth-child(4){border-top-color:#722ed1}.kpi-card:nth-child(5){border-top-color:#f53f3f}.kpi-card:nth-child(6){border-top-color:#14c9c9}.kpi-value{font-size:1.8rem;font-weight:700;color:#1e80ff;margin-bottom:4px;line-height:1.3}.kpi-card:nth-child(2) .kpi-value{color:#00b42a}.kpi-card:nth-child(3) .kpi-value{color:#ff7d00}.kpi-card:nth-child(4) .kpi-value{color:#722ed1}.kpi-card:nth-child(5) .kpi-value{color:#f53f3f}.kpi-card:nth-child(6) .kpi-value{color:#14c9c9}.kpi-label{color:#666;font-size:0.85rem;font-weight:500;margin-bottom:6px;line-height:1.4}.kpi-unit{color:#999;font-size:0.78rem;line-height:1.4}.kpi-sub{font-size:0.8rem;color:#999;margin-top:4px;line-height:1.4}
        .charts-row{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:20px}.chart-panel{background:white;padding:20px 24px;border-radius:10px;box-shadow:0 2px 8px rgba(0,0,0,0.06)}.chart-panel-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}.chart-panel-title{font-size:1.05rem;font-weight:600;color:#333}.chart-box{height:500px}
        .section-panel{background:white;border-radius:10px;box-shadow:0 2px 8px rgba(0,0,0,0.06);margin-bottom:20px;overflow:hidden}.section-panel-header{padding:18px 24px;border-bottom:1px solid #f0f0f0;display:flex;justify-content:space-between;align-items:center}.section-panel-title{font-size:1.05rem;font-weight:600;color:#333;display:flex;align-items:center;gap:8px}.section-panel-actions{display:flex;gap:8px}.btn{padding:8px 16px;border:none;border-radius:6px;cursor:pointer;font-size:0.85rem;font-weight:500}.btn-sm{padding:4px 10px;font-size:0.8rem}.btn-primary{background:#1e80ff;color:white}.btn-outline{background:white;color:#1e80ff;border:1px solid #1e80ff}.btn-outline:hover{background:#e8f4ff}
        .action-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;padding:20px 24px}.action-card{padding:24px;text-align:center;background:#fafafa;border-radius:8px;cursor:pointer;border:2px solid transparent;transition:all 0.2s}.action-card:hover{border-color:#1e80ff;box-shadow:0 4px 12px rgba(30,128,255,0.15)}.action-icon{font-size:2rem;margin-bottom:8px}.action-title{font-weight:600;color:#333;margin-bottom:4px}.action-desc{color:#999;font-size:0.8rem}
        .table-wrap{overflow-x:auto}table{width:100%;border-collapse:collapse}table th,table td{padding:10px 14px;text-align:left;border-bottom:1px solid #f0f0f0;font-size:0.85rem}table th{background:#fafafa;font-weight:600;color:#666}tbody tr:hover{background:#f8f9fa}.text-right{text-align:right}.text-center{text-align:center}.text-green{color:#00b42a;font-weight:600}.text-blue{color:#1e80ff;font-weight:600}.text-red{color:#f53f3f;font-weight:600}.text-orange{color:#ff7d00;font-weight:600}.fw-600{font-weight:600}.row-total{background:#e8f4ff;font-weight:700}
        .tag{display:inline-block;padding:2px 8px;border-radius:4px;font-size:0.72rem;font-weight:600}.tag-green{background:#e8ffea;color:#00b42a}.tag-red{background:#fff2f0;color:#f53f3f}.tag-orange{background:#fff7e6;color:#ff7d00}.tag-blue{background:#e8f3ff;color:#1e80ff}.tag-purple{background:#f5f0ff;color:#722ed1}
        .stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;padding:20px 24px}.stat-card{padding:20px;text-align:center;background:#fafafa;border-radius:8px;border-left:4px solid #1e80ff}.stat-card:nth-child(2){border-left-color:#00b42a}.stat-card:nth-child(3){border-left-color:#ff7d00}.stat-card:nth-child(4){border-left-color:#f53f3f}.stat-value{font-size:1.6rem;font-weight:700;color:#1e80ff;margin-bottom:4px}.stat-card:nth-child(2) .stat-value{color:#00b42a}.stat-card:nth-child(3) .stat-value{color:#ff7d00}.stat-card:nth-child(4) .stat-value{color:#f53f3f}.stat-label{color:#666;font-size:0.85rem}
        @media(max-width:1400px){.kpi-section{grid-template-columns:repeat(3,1fr)}.charts-row{grid-template-columns:1fr}.action-grid,.stats-grid{grid-template-columns:repeat(2,1fr)}}
        @media(min-width:2560px){
            .container{max-width:3440px;padding:30px}
            .header{padding:32px 40px}
            .header h1{font-size:2.2rem}
            .header p{font-size:1.1rem}
            .kpi-section{grid-template-columns:repeat(8,1fr);gap:20px}
            .kpi-card{min-height:150px;padding:32px 20px}
            .kpi-value{font-size:2rem}
            .charts-row{grid-template-columns:1fr 1fr 1fr;gap:24px}
            .chart-panel{padding:24px 30px}
            .chart-box{height:550px}
            .action-grid{grid-template-columns:repeat(4,1fr)}
            .stats-grid{grid-template-columns:repeat(4,1fr)}
            .section-panel{border-radius:12px}
            table th,table td{padding:12px 16px;font-size:0.95rem}
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header"><div class="header-top"><h1>💼 碳资产管理</h1></div><p>碳配额/CCER全生命周期管理 | 资产价值动态测算 | 交易策略支撑 | 履约闭环 | 碳资产保值增值 | 贵州基地</p></div>
        <div class="selector-bar"><div class="selector-group"><span class="selector-label">📅 年度：</span><button class="selector-btn active" data-year="2025" onclick="switchYear('2025')">2025年</button><button class="selector-btn" data-year="2026" onclick="switchYear('2026')">2026年</button></div><div class="selector-divider"></div><div class="selector-group"><span class="selector-label">碳价：</span><input type="number" id="carbonPrice" value="85" step="1" min="20" max="200" style="width:80px;padding:6px 10px;border:1px solid #d9d9d9;border-radius:6px;font-size:0.9rem" onchange="refreshAll()"> <span style="font-size:0.8rem;color:#999">元/tCO₂</span></div></div>
        <div class="kpi-section" id="kpiSection"></div>
        <div class="section-panel"><div class="section-panel-header"><div class="section-panel-title">⚡ 快速操作入口</div></div><div class="action-grid" id="actionGrid"></div></div>
        <div class="charts-row"><div class="chart-panel"><div class="chart-panel-header"><div class="chart-panel-title">📊 碳资产消耗瀑布图</div></div><div class="chart-box" id="waterfallChart"></div></div><div class="chart-panel"><div class="chart-panel-header"><div class="chart-panel-title">📈 配额消耗预测 vs 配额上限</div></div><div class="chart-box" id="forecastChart"></div></div></div>
        <div class="section-panel"><div class="section-panel-header"><div class="section-panel-title">📋 碳资产台账</div><div class="section-panel-actions"><button class="btn btn-outline btn-sm" onclick="exportTable('assetTable')">导出CSV</button></div></div><div class="table-wrap"><table id="assetTable"><thead><tr><th>资产类型</th><th>资产编号</th><th>数量(tCO₂)</th><th>获取时间</th><th>单价(元/tCO₂)</th><th>当前市值(元)</th><th>状态</th></tr></thead><tbody id="assetBody"></tbody></table></div></div>
        <div class="section-panel"><div class="section-panel-header"><div class="section-panel-title">📊 碳资产使用分析</div></div><div class="stats-grid" id="statsGrid"></div></div>
    </div>
    <script>
        const RAW_DATA={'2025':{production:{months:['1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'],actualOutput:[4274.6653,2902.1028,3486.0048,1707.0695,3063.5683,3584.5896,2034.9612,3025.3746,3401.2965,2177.4818,2708.5219,3603.3521]},water:[17386,12949,15143,6768,12579,14614,8813,12421,13803,9131,11312,15117],steam:[1712,1126,1292,574,1061,1186,669,1009,1125,750,954,1269],electricity:[345621,252416.4,290533.2,159854,281599.68,320937.2,211425.8,282957.8,302547.4,210993.6,236026.8,288701]},'2026':{production:{months:['1月','2月','3月','4月'],actualOutput:[4945.632,2834.961,4416.6993,2387.1303]},water:[20543,12165,18367,10380],steam:[1740,1020,1532,823],electricity:[374779.4,227895.6,345636.8,189917.2]}};
        const CF={electricity:0.000581,steam:0.3,water:0.00091};
        let currentYear='2025';

        function getData(){return RAW_DATA[currentYear]}
        function sum(arr){return arr.reduce((a,b)=>a+b,0)}
        function fmtNum(n,d){d=d||2;const v=Number(n).toFixed(d);return parseFloat(v).toLocaleString('en-US',{minimumFractionDigits:d,maximumFractionDigits:d})}
        function calcCarbon(i){const d=getData();return d.electricity[i]*CF.electricity+d.steam[i]*CF.steam+d.water[i]*CF.water}
        function getTotalCarbon(){return sum(getData().electricity.map((v,i)=>calcCarbon(i)))}
        function getCarbonPrice(){const v=parseFloat(document.getElementById('carbonPrice').value);return isNaN(v)||v<=0?85:v}

        function switchYear(year){currentYear=year;document.querySelectorAll('[data-year]').forEach(b=>b.classList.remove('active'));document.querySelector('[data-year="'+year+'"]').classList.add('active');refreshAll()}
        function refreshAll(){renderKPIs();renderActions();renderWaterfall();renderForecast();renderAssetTable();renderStats()}

        function renderKPIs(){
            const totalC=getTotalCarbon();const cp=getCarbonPrice();
            const quota=totalC*0.95;const ccer=totalC*0.08;const used=totalC*0.35;const surplus=quota-used;
            const marketValue=(quota+ccer)*cp;
            const cards=[
                {v:fmtNum(quota,1),l:'可用碳排放配额',u:'tCO₂',s:'总配额-已使用',c:'#1e80ff'},
                {v:fmtNum(ccer,1),l:'CCER存量',u:'tCO₂',s:'可抵销比例上限5-10%',c:'#00b42a'},
                {v:'¥'+fmtNum(cp,0),l:'当前碳市场价格',u:'元/tCO₂',s:'全国碳市场行情',c:'#ff7d00'},
                {v:'¥'+fmtNum(marketValue/10000,0)+'万',l:'碳资产总市值',u:'元',s:'配额+CCER公允价值',c:'#722ed1'},
                {v:fmtNum(used,1),l:'已履约/使用量',u:'tCO₂',s:'履约进度'+fmtNum(totalC>0?used/totalC*100:0,1)+'%',c:'#f53f3f'},
                {v:fmtNum(surplus,1),l:'配额盈余/缺口',u:'tCO₂',s:surplus>0?'盈余可出售'+fmtNum(surplus*cp/10000,0)+'万':'缺口需购入',c:'#14c9c9'}
            ];
            document.getElementById('kpiSection').innerHTML=cards.map(c=>'<div class="kpi-card" style="border-top-color:'+c.c+'"><div class="kpi-value" style="color:'+c.c+'">'+c.v+'</div><div class="kpi-label">'+c.l+'</div><div class="kpi-unit">'+c.u+'</div>'+(c.s?'<div class="kpi-sub">'+c.s+'</div>':'')+'</div>').join('');
        }

        function renderActions(){
            document.getElementById('actionGrid').innerHTML=[
                {i:'📝',t:'资产登记',d:'新增配额/CCER等资产'},{i:'💰',t:'交易管理',d:'买入、卖出、转让操作'},{i:'📊',t:'收益分析',d:'投资回报与成本分析'},{i:'⚖️',t:'履约管理',d:'配额清缴与注销'}
            ].map(a=>'<div class="action-card"><div class="action-icon">'+a.i+'</div><div class="action-title">'+a.t+'</div><div class="action-desc">'+a.d+'</div></div>').join('');
        }

        function renderWaterfall(){
            const dom=document.getElementById('waterfallChart');if(!dom)return;
            const chart=echarts.init(dom);const totalC=getTotalCarbon();
            const quota=totalC*0.95,ccer=totalC*0.08,purchase=totalC*0.05,used=-totalC*0.35;
            const ending=quota+ccer+purchase+used;
            chart.setOption({tooltip:{trigger:'axis',axisPointer:{type:'shadow'}},grid:{left:'3%',right:'4%',bottom:'3%',containLabel:true},xAxis:{type:'category',data:['期初配额','CCER持有','市场购入','履约使用','期末结余']},yAxis:{type:'value',name:'tCO₂'},series:[{name:'资产变化',type:'bar',stack:'total',itemStyle:{color:function(p){return['#1e80ff','#00b42a','#722ed1','#f53f3f','#1e80ff'][p.dataIndex];}},data:[+quota.toFixed(1),+ccer.toFixed(1),+purchase.toFixed(1),+used.toFixed(1),+ending.toFixed(1)]}]});
            window.addEventListener('resize',()=>chart.resize());
        }

        function renderForecast(){
            const dom=document.getElementById('forecastChart');if(!dom)return;
            const chart=echarts.init(dom);const d=getData();const mc=d.water.length;
            const labels=d.production.months.slice(0,mc);
            const cum=d.electricity.map((v,i)=>{
                let s=0;for(let j=0;j<=i;j++)s+=calcCarbon(j);return +s.toFixed(1);
            });
            const quotaLine=sum(d.electricity.map((v,i)=>calcCarbon(i)))*0.95;
            chart.setOption({tooltip:{trigger:'axis'},legend:{data:['累计排放','配额上限'],top:0},grid:{left:'3%',right:'4%',bottom:'3%',containLabel:true},xAxis:{type:'category',data:labels},yAxis:{type:'value',name:'tCO₂'},series:[{name:'累计排放',type:'line',data:cum,itemStyle:{color:'#f53f3f'},lineStyle:{width:2},symbol:'circle',symbolSize:6,areaStyle:{color:'rgba(245,63,63,0.08)'}},{name:'配额上限',type:'line',data:new Array(mc).fill(+quotaLine.toFixed(1)),lineStyle:{type:'dashed',color:'#1e80ff',width:2},symbol:'none'}]});
            window.addEventListener('resize',()=>chart.resize());
        }

        function renderAssetTable(){
            const totalC=getTotalCarbon();const cp=getCarbonPrice();
            const assets=[{type:'免费配额',id:'QF-2025-001',qty:totalC*0.95,date:'2025-01-15',unitPrice:0},{type:'CCER项目',id:'CC-2025-056',qty:totalC*0.08,date:'2025-03-20',unitPrice:55},{type:'市场购买',id:'QB-2025-123',qty:totalC*0.05,date:'2025-05-10',unitPrice:78},{type:'履约使用',id:'QU-2025-078',qty:-totalC*0.35,date:'2025-12-31',unitPrice:cp}];
            document.getElementById('assetBody').innerHTML=assets.map(a=>{
                const mv=a.qty>0?a.qty*cp:0;const st=a.qty>0?'可用':'已注销';const sc=a.qty>0?'tag-green':'tag-red';
                return'<tr><td class="fw-600">'+a.type+'</td><td>'+a.id+'</td><td>'+fmtNum(Math.abs(a.qty),1)+'</td><td>'+a.date+'</td><td>¥'+fmtNum(a.unitPrice,0)+'</td><td class="text-blue fw-600">¥'+fmtNum(mv,0)+'</td><td><span class="tag '+sc+'">'+st+'</span></td></tr>';
            }).join('');
        }

        function renderStats(){
            const totalC=getTotalCarbon();const cp=getCarbonPrice();
            document.getElementById('statsGrid').innerHTML=[
                {v:fmtNum(totalC*0.35/totalC*100,0)+'%',l:'配额使用率'},
                {v:'¥'+fmtNum(totalC*0.08*cp/10000,0)+'万',l:'CCER资产价值'},
                {v:'¥'+fmtNum(totalC*0.95*cp/10000,0)+'万',l:'配额资产总价值'},
                {v:fmtNum(totalC*0.05,1)+' tCO₂',l:'碳资产交易量'}
            ].map(s=>'<div class="stat-card"><div class="stat-value">'+s.v+'</div><div class="stat-label">'+s.l+'</div></div>').join('');
        }

        function exportTable(tableId){const table=document.getElementById(tableId);let csv='\uFEFF';table.querySelectorAll('tr').forEach(row=>{const rd=[];row.querySelectorAll('th,td').forEach(c=>rd.push('"'+c.textContent.trim().replace(/"/g,'""')+'"'));csv+=rd.join(',')+'\n'});const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([csv],{type:'text/csv;charset=utf-8;'}));a.download=tableId+'_'+currentYear+'.csv';a.click();}
        document.addEventListener('DOMContentLoaded',function(){refreshAll()});
    </script>
</body>
</html>
