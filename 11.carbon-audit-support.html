<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>碳核查支撑 - 国家级绿色工厂能源管理平台</title>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'Helvetica Neue',Arial,sans-serif;background:#f0f2f5;color:#333}.container{max-width:1920px;margin:0 auto;padding:20px}
        .header{background:linear-gradient(135deg,#1e80ff 0%,#0e5fd8 100%);color:white;padding:28px 32px;border-radius:12px;margin-bottom:20px;box-shadow:0 4px 16px rgba(30,128,255,0.25)}.header-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}.header h1{font-size:2rem;font-weight:600}.header p{font-size:1rem;opacity:0.92}
        .selector-bar{background:white;padding:16px 24px;border-radius:10px;margin-bottom:20px;box-shadow:0 2px 8px rgba(0,0,0,0.06);display:flex;align-items:center;gap:20px;flex-wrap:wrap}.selector-group{display:flex;align-items:center;gap:8px}.selector-label{font-weight:600;color:#555;font-size:0.9rem}.selector-btn{padding:8px 18px;border:1px solid #d9d9d9;background:white;border-radius:6px;cursor:pointer;font-size:0.9rem;transition:all 0.2s}.selector-btn:hover{border-color:#1e80ff;color:#1e80ff}.selector-btn.active{background:#1e80ff;color:white;border-color:#1e80ff}.selector-divider{width:1px;height:24px;background:#e8e8e8}.selector-select{padding:8px 14px;border:1px solid #d9d9d9;border-radius:6px;font-size:0.9rem;cursor:pointer;background:white;min-width:100px}.selector-select:focus{border-color:#1e80ff;outline:none}
        .kpi-section{display:grid;grid-template-columns:repeat(6,1fr);gap:16px;margin-bottom:20px}.kpi-card{background:white;padding:28px 16px;border-radius:10px;box-shadow:0 2px 8px rgba(0,0,0,0.06);text-align:center;border-top:4px solid #1e80ff;transition:transform 0.2s;overflow:visible;min-height:140px;display:flex;flex-direction:column;justify-content:center}.kpi-card:hover{transform:translateY(-2px)}.kpi-card:nth-child(2){border-top-color:#00b42a}.kpi-card:nth-child(3){border-top-color:#ff7d00}.kpi-card:nth-child(4){border-top-color:#722ed1}.kpi-card:nth-child(5){border-top-color:#f53f3f}.kpi-card:nth-child(6){border-top-color:#14c9c9}.kpi-value{font-size:1.8rem;font-weight:700;color:#1e80ff;margin-bottom:4px;line-height:1.3}.kpi-card:nth-child(2) .kpi-value{color:#00b42a}.kpi-card:nth-child(3) .kpi-value{color:#ff7d00}.kpi-card:nth-child(4) .kpi-value{color:#722ed1}.kpi-card:nth-child(5) .kpi-value{color:#f53f3f}.kpi-card:nth-child(6) .kpi-value{color:#14c9c9}.kpi-label{color:#666;font-size:0.85rem;font-weight:500;margin-bottom:6px;line-height:1.4}.kpi-unit{color:#999;font-size:0.78rem;line-height:1.4}.kpi-sub{font-size:0.8rem;color:#999;margin-top:4px;line-height:1.4}
        .section-panel{background:white;border-radius:10px;box-shadow:0 2px 8px rgba(0,0,0,0.06);margin-bottom:20px;overflow:hidden}.section-panel-header{padding:18px 24px;border-bottom:1px solid #f0f0f0;display:flex;justify-content:space-between;align-items:center}.section-panel-title{font-size:1.05rem;font-weight:600;color:#333;display:flex;align-items:center;gap:8px}.btn{padding:8px 16px;border:none;border-radius:6px;cursor:pointer;font-size:0.85rem;font-weight:500}.btn-sm{padding:4px 10px;font-size:0.8rem}.btn-primary{background:#1e80ff;color:white}.btn-outline{background:white;color:#1e80ff;border:1px solid #1e80ff}
        .audit-layout{display:grid;grid-template-columns:280px 1fr;gap:20px;padding:20px 24px}.task-sidebar{background:#fafafa;padding:16px;border-radius:8px}.task-item{padding:14px 16px;margin-bottom:8px;background:white;border-radius:6px;cursor:pointer;border-left:4px solid transparent;font-size:0.85rem}.task-item:hover,.task-item.active{background:#e8f4ff;border-left-color:#1e80ff}.task-title{font-weight:600;color:#333;margin-bottom:4px}.task-status{font-size:0.75rem}
        .material-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}.material-card{background:#fafafa;padding:16px;border-radius:8px}.material-title{font-weight:600;color:#333;margin-bottom:10px;font-size:0.9rem;display:flex;justify-content:space-between}.material-item{display:flex;justify-content:space-between;align-items:center;padding:8px 12px;background:white;border-radius:4px;margin-bottom:6px;font-size:0.82rem}
        .badge{padding:3px 8px;border-radius:3px;font-size:0.7rem;font-weight:600}.badge-ok{background:#e8ffea;color:#00b42a}.badge-warn{background:#fff7e6;color:#ff7d00}.badge-err{background:#fff2f0;color:#f53f3f}
        .trace-tree{padding:20px;background:#fafafa;border-radius:8px}.trace-node{margin-left:24px;padding:8px 0;border-left:2px solid #d9d9d9;padding-left:16px}.trace-item{background:white;padding:12px 16px;border-radius:6px;display:flex;justify-content:space-between;align-items:center;font-size:0.85rem}.trace-item:hover{background:#e8f4ff}.trace-value{font-weight:700;color:#1e80ff}
        .table-wrap{overflow-x:auto}table{width:100%;border-collapse:collapse}table th,table td{padding:10px 14px;text-align:left;border-bottom:1px solid #f0f0f0;font-size:0.85rem}table th{background:#fafafa;font-weight:600;color:#666}.text-right{text-align:right}.text-center{text-align:center}.text-green{color:#00b42a;font-weight:600}.text-blue{color:#1e80ff;font-weight:600}.text-red{color:#f53f3f;font-weight:600}.fw-600{font-weight:600}.tag{display:inline-block;padding:2px 8px;border-radius:4px;font-size:0.72rem;font-weight:600}.tag-green{background:#e8ffea;color:#00b42a}.tag-red{background:#fff2f0;color:#f53f3f}.tag-orange{background:#fff7e6;color:#ff7d00}.tag-blue{background:#e8f3ff;color:#1e80ff}
        @media(max-width:1400px){.kpi-section{grid-template-columns:repeat(3,1fr)}.audit-layout{grid-template-columns:1fr}.material-grid{grid-template-columns:1fr}}
        @media(min-width:2560px){
            .container{max-width:3440px;padding:30px}
            .header{padding:32px 40px}
            .header h1{font-size:2.2rem}
            .header p{font-size:1.1rem}
            .kpi-section{grid-template-columns:repeat(8,1fr);gap:20px}
            .kpi-card{min-height:150px;padding:32px 20px}
            .kpi-value{font-size:2rem}
            .audit-layout{grid-template-columns:320px 1fr}
            .material-grid{grid-template-columns:repeat(4,1fr)}
            .section-panel{border-radius:12px}
            table th,table td{padding:12px 16px;font-size:0.95rem}
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header"><div class="header-top"><h1>🔍 碳核查支撑模块</h1></div><p>全周期核查闭环 | 材料自动归集 | 证据链追溯 | 边界管理 | 异常自纠与整改跟踪 | 核查合规保障 | 贵州基地</p></div>
        <div class="selector-bar"><div class="selector-group"><span class="selector-label">📅 年度：</span><button class="selector-btn active" data-year="2025" onclick="switchYear('2025')">2025年</button><button class="selector-btn" data-year="2026" onclick="switchYear('2026')">2026年</button></div><div class="selector-divider"></div><div class="selector-group"><span class="selector-label">核查阶段：</span><select class="selector-select" onchange="refreshAll()"><option value="pre">核查前准备</option><option value="during">核查中</option><option value="post">核查后整改</option></select></div></div>
        <div class="kpi-section" id="kpiSection"></div>
        <div class="section-panel"><div class="section-panel-header"><div class="section-panel-title">📋 核查任务与材料归集</div></div><div class="audit-layout"><div class="task-sidebar" id="taskSidebar"></div><div class="material-grid" id="materialGrid"></div></div></div>
        <div class="section-panel"><div class="section-panel-header"><div class="section-panel-title">🔗 碳排放证据链追溯树</div></div><div class="trace-tree" id="traceTree"></div></div>
        <div class="section-panel"><div class="section-panel-header"><div class="section-panel-title">⚠️ 异常报告与整改跟踪</div></div><div class="table-wrap"><table id="issueTable"><thead><tr><th>问题编号</th><th>发现时间</th><th>问题描述</th><th>优先级</th><th>整改状态</th><th>负责人</th><th>截止日期</th></tr></thead><tbody id="issueBody"></tbody></table></div></div>
    </div>
    <script>
        const RAW_DATA={'2025':{production:{months:['1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'],actualOutput:[4274.6653,2902.1028,3486.0048,1707.0695,3063.5683,3584.5896,2034.9612,3025.3746,3401.2965,2177.4818,2708.5219,3603.3521]},water:[17386,12949,15143,6768,12579,14614,8813,12421,13803,9131,11312,15117],steam:[1712,1126,1292,574,1061,1186,669,1009,1125,750,954,1269],electricity:[345621,252416.4,290533.2,159854,281599.68,320937.2,211425.8,282957.8,302547.4,210993.6,236026.8,288701]},'2026':{production:{months:['1月','2月','3月','4月'],actualOutput:[4945.632,2834.961,4416.6993,2387.1303]},water:[20543,12165,18367,10380],steam:[1740,1020,1532,823],electricity:[374779.4,227895.6,345636.8,189917.2]}};
        const CF={electricity:0.000581,steam:0.3,water:0.00091};
        let currentYear='2025';

        function getData(){return RAW_DATA[currentYear]}
        function sum(arr){return arr.reduce((a,b)=>a+b,0)}
        function fmtNum(n,d){d=d||2;const v=Number(n).toFixed(d);return parseFloat(v).toLocaleString('en-US',{minimumFractionDigits:d,maximumFractionDigits:d})}
        function calcCarbon(i){const d=getData();return d.electricity[i]*CF.electricity+d.steam[i]*CF.steam+d.water[i]*CF.water}
        function getTotalCarbon(){return sum(getData().electricity.map((v,i)=>calcCarbon(i)))}

        function switchYear(year){currentYear=year;document.querySelectorAll('[data-year]').forEach(b=>b.classList.remove('active'));document.querySelector('[data-year="'+year+'"]').classList.add('active');refreshAll()}
        function refreshAll(){renderKPIs();renderTasks();renderTrace();renderIssues()}

        function renderKPIs(){
            const totalC=getTotalCarbon();const d=getData();const mc=d.water.length;
            const cards=[
                {v:fmtNum(totalC,1),l:'核查碳排放总量',u:'tCO₂',s:'范围1+2合计',c:'#1e80ff'},
                {v:'98%',l:'数据完整率',u:'',s:'电力/蒸汽/水全覆盖',c:'#00b42a'},
                {v:'15/16',l:'材料归集完成',u:'份',s:'1份待补充',c:'#ff7d00'},
                {v:'3个',l:'待整改问题',u:'',s:'1高+1中+1低',c:'#722ed1'},
                {v:'A级',l:'预期核查评级',u:'',s:'基于数据质量评估',c:'#f53f3f'},
                {v:fmtNum(totalC*60/10000,0)+'万',l:'碳核查合规价值',u:'元',s:'规避超排处罚风险',c:'#14c9c9'}
            ];
            document.getElementById('kpiSection').innerHTML=cards.map(c=>'<div class="kpi-card" style="border-top-color:'+c.c+'"><div class="kpi-value" style="color:'+c.c+'">'+c.v+'</div><div class="kpi-label">'+c.l+'</div><div class="kpi-unit">'+c.u+'</div>'+(c.s?'<div class="kpi-sub">'+c.s+'</div>':'')+'</div>').join('');
        }

        function renderTasks(){
            document.getElementById('taskSidebar').innerHTML=[
                {t:'数据准备阶段',s:'completed',l:'已完成'},{t:'活动数据凭证收集',s:'inprogress',l:'进行中'},{t:'排放因子佐证上传',s:'inprogress',l:'进行中'},{t:'逻辑校验阶段',s:'pending',l:'待开始'},{t:'异常自纠自查',s:'pending',l:'待开始'},{t:'核查报告生成',s:'pending',l:'待开始'},{t:'材料打包归档',s:'pending',l:'待开始'}
            ].map(task=>'<div class="task-item'+(task.s==='inprogress'?' active':'')+'"><div class="task-title">'+task.t+'</div><span class="task-status '+(task.s==='completed'?'tag-green':task.s==='inprogress'?'tag-blue':'tag-orange')+'">'+task.l+'</span></div>').join('');

            const mSets=[{t:'📄 活动数据凭证区',c:'8/10 完成',items:[{n:'电力消耗数据',s:'ok'},{n:'蒸汽消耗数据',s:'ok'},{n:'用水量数据',s:'ok'},{n:'生产产量报表',s:'ok'},{n:'能源采购发票',s:'warn'}]},{t:'📊 排放因子佐证区',c:'6/8 完成',items:[{n:'电网排放因子',s:'ok'},{n:'蒸汽排放因子',s:'ok'},{n:'水排放因子',s:'warn'},{n:'锅炉热效率报告',s:'ok'},{n:'工艺排放因子',s:'err'}]},{t:'✅ 逻辑校验区',c:'4/6 完成',items:[{n:'数据一致性检查',s:'ok'},{n:'计算逻辑验证',s:'warn'},{n:'边界完整性检查',s:'err'},{n:'历史数据对比',s:'ok'},{n:'异常值检测',s:'warn'}]}];
            document.getElementById('materialGrid').innerHTML=mSets.map(ms=>'<div class="material-card"><div class="material-title"><span>'+ms.t+'</span><span class="badge '+(ms.c.includes('10')||ms.c.includes('8')?'badge-ok':'badge-warn')+'">'+ms.c+'</span></div>'+ms.items.map(it=>'<div class="material-item"><span>'+it.n+'</span><span class="badge '+(it.s==='ok'?'badge-ok':it.s==='warn'?'badge-warn':'badge-err')+'">'+(it.s==='ok'?'已收集':it.s==='warn'?'待补充':'未收集')+'</span></div>').join('')+'</div>').join('');
        }

        function renderTrace(){
            const totalC=getTotalCarbon();const d=getData();const totalE=sum(d.electricity);
            document.getElementById('traceTree').innerHTML=`<div class="trace-item" style="margin-bottom:12px;font-size:0.9rem;font-weight:600;">📊 碳排放总量：${fmtNum(totalC,1)} tCO₂</div>
<div class="trace-node"><div class="trace-item"><span>⚡ 生产系统用电量</span><span class="trace-value">${fmtNum(totalE,0)} kWh</span></div>
<div class="trace-node"><div class="trace-item"><span>📄 电费缴费发票 #E-2025-001</span><span style="color:#1e80ff;cursor:pointer;">预览扫描件</span></div></div>
<div class="trace-node"><div class="trace-item"><span>🔢 电网排放因子（南方区域）</span><span class="trace-value">0.5810 tCO₂/MWh</span></div></div>
<div class="trace-node"><div class="trace-item"><span>🧮 碳排放计算：${fmtNum(totalE,0)} × 0.000581 = ${fmtNum(totalE*CF.electricity,1)} tCO₂</span></div></div></div>
<div class="trace-node"><div class="trace-item"><span>♨️ 生产系统用汽量</span><span class="trace-value">${fmtNum(sum(d.steam),0)} t</span></div>
<div class="trace-node"><div class="trace-item"><span>📄 蒸汽采购凭证</span><span style="color:#1e80ff;cursor:pointer;">预览</span></div></div>
<div class="trace-node"><div class="trace-item"><span>🧮 碳排放计算：${fmtNum(sum(d.steam),0)} × 0.3 = ${fmtNum(sum(d.steam)*0.3,1)} tCO₂</span></div></div></div>`;
        }

        function renderIssues(){
            const issues=[{id:'ISS-2025-001',date:'2025-06',desc:'6月用电量数据波动超出正常范围±20%，需核实电表读数',priority:'高',status:'整改中',owner:'张工',deadline:'2025-07-15'},{id:'ISS-2025-002',date:'2025-08',desc:'蒸汽排放因子佐证材料不完整，缺少天然气低位发热值检测报告',priority:'中',status:'待整改',owner:'李工',deadline:'2025-07-30'},{id:'ISS-2025-003',date:'2025-04',desc:'4月产量数据与能耗数据比例偏差超过10%，需核查计量数据',priority:'低',status:'已关闭',owner:'王工',deadline:'2025-06-30'}];
            document.getElementById('issueBody').innerHTML=issues.map(iss=>'<tr><td class="fw-600">'+iss.id+'</td><td>'+iss.date+'</td><td>'+iss.desc+'</td><td class="text-center"><span class="tag '+(iss.priority==='高'?'tag-red':iss.priority==='中'?'tag-orange':'tag-blue')+'">'+iss.priority+'</span></td><td class="text-center"><span class="tag '+(iss.status==='已关闭'?'tag-green':iss.status==='整改中'?'tag-blue':'tag-orange')+'">'+iss.status+'</span></td><td>'+iss.owner+'</td><td>'+iss.deadline+'</td></tr>').join('');
        }
        document.addEventListener('DOMContentLoaded',function(){refreshAll()});
    </script>
</body>
</html>
