<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>能源消费分析模块 - 国家级绿色工厂能源管理平台</title>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif; background-color: #f0f2f5; color: #333; }
        .container { max-width: 1920px; margin: 0 auto; padding: 20px; }

        .header { background: linear-gradient(135deg, #ff7d00 0%, #d96800 100%); color: white; padding: 28px 32px; border-radius: 12px; margin-bottom: 20px; box-shadow: 0 4px 16px rgba(255, 125, 0, 0.25); }
        .header-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
        .header h1 { font-size: 2rem; font-weight: 600; }
        .back-btn { background: rgba(255,255,255,0.25); color: white; border: none; padding: 10px 20px; border-radius: 6px; cursor: pointer; text-decoration: none; display: inline-flex; align-items: center; gap: 8px; font-size: 0.95rem; }
        .back-btn:hover { background: rgba(255,255,255,0.35); }
        .header p { font-size: 1rem; opacity: 0.92; }

        .selector-bar { background: white; padding: 16px 24px; border-radius: 10px; margin-bottom: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.06); display: flex; align-items: center; gap: 20px; flex-wrap: wrap; }
        .selector-group { display: flex; align-items: center; gap: 8px; }
        .selector-label { font-weight: 600; color: #555; font-size: 0.9rem; white-space: nowrap; }
        .selector-btn { padding: 8px 18px; border: 1px solid #d9d9d9; background: white; border-radius: 6px; cursor: pointer; font-size: 0.9rem; transition: all 0.2s; white-space: nowrap; }
        .selector-btn:hover { border-color: #ff7d00; color: #ff7d00; }
        .selector-btn.active { background: #ff7d00; color: white; border-color: #ff7d00; }
        .selector-divider { width: 1px; height: 24px; background: #e8e8e8; }
        .selector-select { padding: 8px 14px; border: 1px solid #d9d9d9; border-radius: 6px; font-size: 0.9rem; cursor: pointer; background: white; min-width: 110px; }
        .selector-select:focus { border-color: #ff7d00; outline: none; }

        .kpi-section { display: grid; grid-template-columns: repeat(6, 1fr); gap: 16px; margin-bottom: 20px; }
        .kpi-card { background: white; padding: 28px 16px; border-radius: 10px; box-shadow: 0 2px 8px rgba(0,0,0,0.06); text-align: center; border-top: 4px solid #ff7d00; transition: transform 0.2s; cursor: default; overflow: visible; min-height: 140px; display: flex; flex-direction: column; justify-content: center; }
        .kpi-card:hover { transform: translateY(-2px); box-shadow: 0 4px 16px rgba(0,0,0,0.1); }
        .kpi-card:nth-child(2) { border-top-color: #1e80ff; }
        .kpi-card:nth-child(3) { border-top-color: #f53f3f; }
        .kpi-card:nth-child(4) { border-top-color: #00b42a; }
        .kpi-card:nth-child(5) { border-top-color: #722ed1; }
        .kpi-card:nth-child(6) { border-top-color: #14c9c9; }
        .kpi-value { font-size: 1.8rem; font-weight: 700; color: #ff7d00; margin-bottom: 4px; line-height: 1.3; }
        .kpi-card:nth-child(2) .kpi-value { color: #1e80ff; }
        .kpi-card:nth-child(3) .kpi-value { color: #f53f3f; }
        .kpi-card:nth-child(4) .kpi-value { color: #00b42a; }
        .kpi-card:nth-child(5) .kpi-value { color: #722ed1; }
        .kpi-card:nth-child(6) .kpi-value { color: #14c9c9; }
        .kpi-label { color: #666; font-size: 0.85rem; font-weight: 500; margin-bottom: 6px; line-height: 1.4; }
        .kpi-unit { color: #999; font-size: 0.78rem; line-height: 1.4; }
        .kpi-sub { font-size: 0.8rem; color: #999; margin-top: 4px; line-height: 1.4; }

        .charts-row { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px; }
        .charts-row-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 20px; margin-bottom: 20px; }
        .chart-panel { background: white; padding: 20px 24px; border-radius: 10px; box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
        .chart-panel-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
        .chart-panel-title { font-size: 1.05rem; font-weight: 600; color: #333; }
        .chart-box { height: 580px; }
        .chart-box-sm { height: 480px; }

        .section-panel { background: white; border-radius: 10px; box-shadow: 0 2px 8px rgba(0,0,0,0.06); margin-bottom: 20px; overflow: hidden; }
        .section-panel-header { padding: 18px 24px; border-bottom: 1px solid #f0f0f0; display: flex; justify-content: space-between; align-items: center; }
        .section-panel-title { font-size: 1.05rem; font-weight: 600; color: #333; display: flex; align-items: center; gap: 8px; }
        .section-panel-actions { display: flex; gap: 8px; }
        .btn { padding: 8px 16px; border: none; border-radius: 6px; cursor: pointer; font-size: 0.85rem; font-weight: 500; transition: all 0.2s; }
        .btn-sm { padding: 4px 10px; font-size: 0.8rem; }
        .btn-primary { background: #ff7d00; color: white; }
        .btn-primary:hover { background: #d96800; }
        .btn-outline { background: white; color: #ff7d00; border: 1px solid #ff7d00; }
        .btn-outline:hover { background: #fff7e6; }
        .btn-ghost { background: transparent; color: #666; border: 1px solid #d9d9d9; }
        .btn-ghost:hover { border-color: #ff7d00; color: #ff7d00; }

        .table-wrap { overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; }
        table th, table td { padding: 12px 16px; text-align: left; border-bottom: 1px solid #f0f0f0; font-size: 0.9rem; }
        table th { background: #fafafa; font-weight: 600; color: #666; white-space: nowrap; position: sticky; top: 0; }
        table tbody tr:hover { background: #f8f9fa; }
        .text-right { text-align: right; }
        .text-center { text-align: center; }
        .text-green { color: #00b42a; font-weight: 600; }
        .text-blue { color: #1e80ff; font-weight: 600; }
        .text-orange { color: #ff7d00; font-weight: 600; }
        .text-red { color: #f53f3f; font-weight: 600; }
        .text-muted { color: #999; }
        .fw-600 { font-weight: 600; }
        .row-total { background: #fff7e6; font-weight: 700; }
        .row-subtotal { background: #fafafa; font-weight: 600; }

        .hierarchy-table .level-0 { padding-left: 8px; }
        .hierarchy-table .level-1 { padding-left: 32px; }
        .hierarchy-table .level-2 { padding-left: 56px; }
        .hierarchy-table .expand-icon { cursor: pointer; display: inline-block; width: 18px; text-align: center; user-select: none; transition: transform 0.2s; font-size: 0.75rem; }
        .hierarchy-table .expand-icon.expanded { transform: rotate(90deg); }

        .tag { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 0.75rem; font-weight: 600; }
        .tag-green { background: #e8ffea; color: #00b42a; }
        .tag-red { background: #fff2f0; color: #f53f3f; }
        .tag-orange { background: #fff7e6; color: #ff7d00; }
        .tag-blue { background: #e8f3ff; color: #1e80ff; }
        .tag-gray { background: #f5f5f5; color: #999; }

        .anomaly-banner { background: linear-gradient(135deg, #fff2f0 0%, #ffccc7 100%); border: 1px solid #ffa39e; padding: 16px 24px; border-radius: 10px; margin-bottom: 20px; display: flex; align-items: center; gap: 16px; }
        .anomaly-banner-icon { font-size: 2rem; }
        .anomaly-banner-content { flex: 1; }
        .anomaly-banner-title { font-weight: 700; color: #cf1322; font-size: 1rem; margin-bottom: 4px; }
        .anomaly-banner-desc { color: #820014; font-size: 0.9rem; }

        .strategy-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; padding: 20px 24px; }
        .strategy-card { padding: 20px; background: #fafafa; border-radius: 8px; border-left: 4px solid #ff7d00; }
        .strategy-card:nth-child(2) { border-left-color: #1e80ff; }
        .strategy-card:nth-child(3) { border-left-color: #00b42a; }
        .strategy-card:nth-child(4) { border-left-color: #722ed1; }
        .strategy-title { font-weight: 600; color: #333; margin-bottom: 8px; font-size: 0.95rem; }
        .strategy-desc { color: #666; font-size: 0.85rem; line-height: 1.6; margin-bottom: 12px; }
        .strategy-meta { display: flex; gap: 16px; font-size: 0.8rem; color: #999; }

        .progress-bar-wrap { display: flex; align-items: center; gap: 8px; }
        .progress-bar { flex: 1; height: 8px; background: #f0f0f0; border-radius: 4px; overflow: hidden; }
        .progress-fill { height: 100%; border-radius: 4px; }
        .progress-label { font-size: 0.8rem; color: #666; min-width: 45px; text-align: right; }

        @media (max-width: 1400px) {
            .kpi-section { grid-template-columns: repeat(3, 1fr); }
            .charts-row, .charts-row-3 { grid-template-columns: 1fr; }
            .strategy-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="header-top">
                <h1>📊 能源消费分析模块</h1>
                <a href="0.index.html" class="back-btn">← 返回首页</a>
            </div>
            <p>能耗结构树状分析 | 全周期/半周期对比 | 异常检测与预警 | 蒸汽消耗与锅炉能耗分析 | 用能策略推荐 | 贵州基地一车间</p>
        </div>

        <div class="selector-bar">
            <div class="selector-group">
                <span class="selector-label">📅 年度：</span>
                <button class="selector-btn active" data-year="2025" onclick="switchYear('2025')">2025年</button>
                <button class="selector-btn" data-year="2026" onclick="switchYear('2026')">2026年</button>
            </div>
            <div class="selector-divider"></div>
            <div class="selector-group">
                <span class="selector-label">分析周期：</span>
                <select class="selector-select" id="periodSelect" onchange="switchPeriod()">
                    <option value="full">全周期（1-12月）</option>
                    <option value="first">上半年（1-6月）</option>
                    <option value="second">下半年（7-12月）</option>
                </select>
            </div>
            <div class="selector-divider"></div>
            <div class="selector-group">
                <span class="selector-label">对比基准：</span>
                <select class="selector-select" id="compareSelect" onchange="switchPeriod()">
                    <option value="none">无对比</option>
                    <option value="yoy">同比（去年同期）</option>
                    <option value="mom">环比（上一周期）</option>
                </select>
            </div>
        </div>

        <div class="kpi-section" id="kpiSection"></div>

        <div id="anomalyBanner"></div>

        <div class="charts-row">
            <div class="chart-panel">
                <div class="chart-panel-header">
                    <div class="chart-panel-title">🌳 能耗结构树状图（全周期综合能耗）</div>
                </div>
                <div class="chart-box" id="treemapChart"></div>
            </div>
            <div class="chart-panel">
                <div class="chart-panel-header">
                    <div class="chart-panel-title">📊 全周期 vs 半周期 工序能耗对比</div>
                </div>
                <div class="chart-box" id="compareChart"></div>
            </div>
        </div>

        <div class="section-panel">
            <div class="section-panel-header">
                <div class="section-panel-title">🏭 公司能耗结构树状层级表（含数据对比与异常预警）</div>
                <div class="section-panel-actions">
                    <button class="btn btn-ghost btn-sm" onclick="expandAllTree()">全部展开</button>
                    <button class="btn btn-ghost btn-sm" onclick="collapseAllTree()">全部折叠</button>
                    <button class="btn btn-outline btn-sm" onclick="exportTable('treeTable')">导出CSV</button>
                </div>
            </div>
            <div class="table-wrap">
                <table class="hierarchy-table" id="treeTable">
                    <thead>
                        <tr>
                            <th style="width:36px;"></th>
                            <th>一级层级</th>
                            <th>二级层级（统计周期/能耗类型）</th>
                            <th>三级层级（用能环节/模块）</th>
                            <th>综合能耗(tce)</th>
                            <th>占比</th>
                            <th>环比/对比变化</th>
                            <th>异常预警（±3%阈值）</th>
                        </tr>
                    </thead>
                    <tbody id="treeBody"></tbody>
                </table>
            </div>
        </div>

        <div class="charts-row">
            <div class="chart-panel">
                <div class="chart-panel-header">
                    <div class="chart-panel-title">♨️ 蒸汽消耗工序分布</div>
                </div>
                <div class="chart-box" id="steamDistChart"></div>
            </div>
            <div class="chart-panel">
                <div class="chart-panel-header">
                    <div class="chart-panel-title">🔥 锅炉能耗能源结构</div>
                </div>
                <div class="chart-box" id="boilerChart"></div>
            </div>
        </div>

        <div class="charts-row">
            <div class="chart-panel">
                <div class="chart-panel-header">
                    <div class="chart-panel-title">📈 月度综合能耗趋势（折标煤）</div>
                </div>
                <div class="chart-box" id="monthlyTrendChart"></div>
            </div>
            <div class="chart-panel">
                <div class="chart-panel-header">
                    <div class="chart-panel-title">📉 单位产品综合能耗月度趋势</div>
                </div>
                <div class="chart-box" id="unitTrendChart"></div>
            </div>
        </div>

        <div class="section-panel">
            <div class="section-panel-header">
                <div class="section-panel-title">💡 用能策略推荐</div>
            </div>
            <div class="strategy-grid" id="strategyGrid"></div>
        </div>
    </div>

    <script>
        // ==================== 实际用量数据 ====================
        const RAW_DATA = {
            '2025': {
                production: {
                    months: ['1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'],
                    actualOutput: [4274.6653, 2902.1028, 3486.0048, 1707.0695, 3063.5683, 3584.5896, 2034.9612, 3025.3746, 3401.2965, 2177.4818, 2708.5219, 3603.3521]
                },
                water: [17386, 12949, 15143, 6768, 12579, 14614, 8813, 12421, 13803, 9131, 11312, 15117],
                steam: [1712, 1126, 1292, 574, 1061, 1186, 669, 1009, 1125, 750, 954, 1269],
                electricity: [345621, 252416.4, 290533.2, 159854, 281599.68, 320937.2, 211425.8, 282957.8, 302547.4, 210993.6, 236026.8, 288701]
            },
            '2026': {
                production: {
                    months: ['1月','2月','3月','4月'],
                    actualOutput: [4945.632, 2834.961, 4416.6993, 2387.1303]
                },
                water: [20543, 12165, 18367, 10380],
                steam: [1740, 1020, 1532, 823],
                electricity: [374779.4, 227895.6, 345636.8, 189917.2]
            }
        };

        // ==================== 折标系数 ====================
        const COEF = {
            electricity: 0.1229 / 1000,
            water: 0.0857 / 1000,
            steam: 0.1000
        };

        // ==================== 能耗结构参考数据（来自数据结构文件） ====================
        const STRUCTURE_DATA = {
            fullCycle: {
                total: 1587.02,
                processes: [
                    { name: '配料工序', tce: 557.77, pct: 35.14, category: '生产系统' },
                    { name: '水处理工序', tce: 27.97, pct: 1.76, category: '生产系统' },
                    { name: '灌装工序一线', tce: 356.25, pct: 22.45, category: '生产系统' },
                    { name: '灌装工序二线', tce: 370.42, pct: 23.34, category: '生产系统' },
                    { name: '包装工序一线', tce: 72.05, pct: 4.54, category: '生产系统' },
                    { name: '包装工序二线', tce: 74.24, pct: 4.68, category: '生产系统' },
                    { name: '空压机及供气系统', tce: 43.66, pct: 2.75, category: '辅助系统' },
                    { name: '锅炉', tce: 0, pct: 0, category: '辅助系统' },
                    { name: '制冷（中央空调）', tce: 62.31, pct: 3.93, category: '辅助系统' },
                    { name: '其他（污水站、消防等）', tce: 22.35, pct: 1.41, category: '辅助系统' }
                ]
            },
            secondHalf: {
                total: 735.69,
                processes: [
                    { name: '配料工序', tce: 226.86, pct: 30.84, category: '生产系统', change: -2.35, anomaly: false },
                    { name: '水处理工序', tce: 12.57, pct: 1.71, category: '生产系统', change: 0.03, anomaly: false },
                    { name: '灌装工序一线', tce: 165.22, pct: 22.46, category: '生产系统', change: 1.09, anomaly: false },
                    { name: '灌装工序二线', tce: 204.33, pct: 27.77, category: '生产系统', change: 5.28, anomaly: true },
                    { name: '包装工序一线', tce: 30.85, pct: 4.19, category: '生产系统', change: -0.11, anomaly: false },
                    { name: '包装工序二线', tce: 32.62, pct: 4.43, category: '生产系统', change: 0, anomaly: false },
                    { name: '空压机及供气系统', tce: 19.71, pct: 2.68, category: '辅助系统', change: 0.06, anomaly: false },
                    { name: '锅炉', tce: 0, pct: 0, category: '辅助系统', change: null, anomaly: false },
                    { name: '制冷（中央空调）', tce: 30.94, pct: 4.21, category: '辅助系统', change: 0.45, anomaly: false },
                    { name: '其他（污水站、消防等）', tce: 12.59, pct: 1.71, category: '辅助系统', change: 0.35, anomaly: false }
                ]
            },
            steamSecondHalf: {
                total: 6146,
                processes: [
                    { name: '配料工序', tce: 2353, pct: 38.28 },
                    { name: '灌装工序一线', tce: 1685, pct: 27.42 },
                    { name: '灌装工序二线', tce: 2108, pct: 34.30 }
                ]
            },
            boilerSecondHalf: {
                total: 15765.21,
                sources: [
                    { name: '天然气', tce: 588132.01, pct: 50.68 },
                    { name: '自产蒸汽', tce: 572366.80, pct: 49.32 }
                ]
            }
        };

        // ==================== 全局状态 ====================
        let currentYear = '2025';
        let currentPeriod = 'full';
        let compareMode = 'none';

        // ==================== 工具函数 ====================
        function getData() { return RAW_DATA[currentYear]; }
        function getMonthCount() { return getData().water.length; }
        function sum(arr) { return arr.reduce((a, b) => a + b, 0); }
        function fmt(n, d) { d = d || 2; return Number(n).toFixed(d); }
        function fmtNum(n, d) { d = d || 2; const v = Number(n).toFixed(d); return parseFloat(v).toLocaleString('en-US', { minimumFractionDigits: d, maximumFractionDigits: d }); }

        function getPeriodIndices() {
            const mc = getMonthCount();
            if (currentPeriod === 'full') return { start: 0, end: mc - 1 };
            if (currentPeriod === 'first') return { start: 0, end: Math.min(5, mc - 1) };
            if (currentPeriod === 'second') return { start: Math.min(6, mc - 1), end: mc - 1 };
            return { start: 0, end: mc - 1 };
        }

        function getPeriodData(key) {
            const d = getData();
            const { start, end } = getPeriodIndices();
            return d[key].slice(start, end + 1);
        }

        function getPeriodSum(key) {
            return sum(getPeriodData(key));
        }

        function getPeriodProduction() {
            const d = getData();
            const { start, end } = getPeriodIndices();
            return sum(d.production.actualOutput.slice(start, end + 1));
        }

        function getPeriodLabels() {
            const d = getData();
            const { start, end } = getPeriodIndices();
            return d.production.months.slice(start, end + 1);
        }

        // ==================== 年份/周期切换 ====================
        function switchYear(year) {
            currentYear = year;
            document.querySelectorAll('[data-year]').forEach(b => b.classList.remove('active'));
            document.querySelector('[data-year="' + year + '"]').classList.add('active');

            const periodSel = document.getElementById('periodSelect');
            const mc = getMonthCount();
            if (mc < 12) {
                if (currentPeriod === 'second' && mc <= 6) {
                    currentPeriod = 'full';
                    periodSel.value = 'full';
                }
                periodSel.querySelector('option[value="second"]').disabled = mc <= 6;
                periodSel.querySelector('option[value="first"]').disabled = false;
            } else {
                periodSel.querySelectorAll('option').forEach(o => o.disabled = false);
            }
            refreshAll();
        }

        function switchPeriod() {
            currentPeriod = document.getElementById('periodSelect').value;
            compareMode = document.getElementById('compareSelect').value;
            refreshAll();
        }

        // ==================== 刷新全部 ====================
        function refreshAll() {
            renderKPIs();
            renderAnomalyBanner();
            renderTreemapChart();
            renderCompareChart();
            renderTreeTable();
            renderSteamDistChart();
            renderBoilerChart();
            renderMonthlyTrendChart();
            renderUnitTrendChart();
            renderStrategies();
        }

        // ==================== KPI卡片 ====================
        function renderKPIs() {
            const totalElec = getPeriodSum('electricity');
            const totalWater = getPeriodSum('water');
            const totalSteam = getPeriodSum('steam');
            const elecTce = totalElec * COEF.electricity;
            const waterTce = totalWater * COEF.water;
            const steamTce = totalSteam * COEF.steam;
            const totalTce = elecTce + waterTce + steamTce;
            const prodSum = getPeriodProduction();
            const unitTce = prodSum > 0 ? totalTce / prodSum : 0;

            const anomalyCount = STRUCTURE_DATA.secondHalf.processes.filter(p => p.anomaly).length;

            const cards = [
                { value: fmtNum(totalTce, 2), label: '综合能耗总量', unit: 'tce', sub: '电力+水+蒸汽折标煤', color: '#ff7d00' },
                { value: fmtNum(totalElec / 10000, 2), label: '总用电量', unit: '万kWh', sub: '折标煤 ' + fmtNum(elecTce, 2) + ' tce', color: '#1e80ff' },
                { value: anomalyCount + '个', label: '异常预警工序', unit: '±3%阈值', sub: anomalyCount > 0 ? '灌装二线偏高' : '暂无异常', color: '#f53f3f' },
                { value: fmtNum(totalSteam, 0), label: '蒸汽消耗总量', unit: 't', sub: '折标煤 ' + fmtNum(steamTce, 2) + ' tce', color: '#00b42a' },
                { value: fmtNum(prodSum, 1), label: '实际产量', unit: 't', sub: '一车间', color: '#722ed1' },
                { value: fmtNum(unitTce, 4), label: '单位产品综合能耗', unit: 'tce/t', sub: '', color: '#14c9c9' }
            ];

            document.getElementById('kpiSection').innerHTML = cards.map((c, i) => `
                <div class="kpi-card" style="border-top-color:${c.color}">
                    <div class="kpi-value" style="color:${c.color}">${c.value}</div>
                    <div class="kpi-label">${c.label}</div>
                    <div class="kpi-unit">${c.unit}</div>
                    ${c.sub ? '<div class="kpi-sub">' + c.sub + '</div>' : ''}

            `).join('');
        }

        // ==================== 异常预警横幅 ====================
        function renderAnomalyBanner() {
            const anomalies = STRUCTURE_DATA.secondHalf.processes.filter(p => p.anomaly);

                container.innerHTML = '';

                <div class="anomaly-banner">
                    <div class="anomaly-banner-icon">⚠️</div>
                    <div class="anomaly-banner-content">
                        <div class="anomaly-banner-title">异常预警：${a.name} 能耗占比异常</div>
                        <div class="anomaly-banner-desc">
                            7-12月综合能耗占比 ${fmtNum(a.pct, 2)}%，环比全周期变化 <strong>${a.change > 0 ? '+' : ''}${fmtNum(a.change, 2)}%</strong>，

                        </div>
                    </div>
                </div>
            `).join('');

        // ==================== 能耗结构树状图 ====================
        function renderTreemapChart() {
            const dom = document.getElementById('treemapChart');
            if (!dom) return;
            const chart = echarts.init(dom);

            const totalTce = getPeriodSum('electricity') * COEF.electricity + getPeriodSum('water') * COEF.water + getPeriodSum('steam') * COEF.steam;
            const refData = currentPeriod === 'second' ? STRUCTURE_DATA.secondHalf : STRUCTURE_DATA.fullCycle;

            const prodItems = refData.processes.filter(p => p.category === '生产系统').map(p => ({
                name: p.name, value: +(totalTce * p.pct / 100).toFixed(2)
            }));
            const auxItems = refData.processes.filter(p => p.category === '辅助系统').map(p => ({
                name: p.name, value: +(totalTce * p.pct / 100).toFixed(2)
            }));

            const colors = ['#1e80ff','#00b42a','#ff7d00','#722ed1','#f53f3f','#14c9c9','#f7ba1e','#86909c','#e8654a','#4a90d9'];

            chart.setOption({
                tooltip: { formatter: function(p) { return p.name + '<br/>综合能耗: ' + fmtNum(p.value, 2) + ' tce'; } },
                series: [{
                    type: 'treemap', roam: false, width: '100%', height: '92%',
                    breadcrumb: { show: true, height: 28, bottom: 0 },
                    label: { show: true, formatter: function(p) { return p.name + '\n' + fmtNum(p.value, 1) + ' tce'; } },
                    upperLabel: { show: true, height: 28 },
                    itemStyle: { borderColor: '#fff', borderWidth: 2 },
                    levels: [
                        { colorMapping: 'value', visualMin: 0, visualMax: totalTce, color: colors },
                        { itemStyle: { borderWidth: 2, gapWidth: 2 }, upperLabel: { show: true } }
                    ],
                    data: [
                        { name: '生产系统', children: prodItems },
                        { name: '辅助系统', children: auxItems }
                    ]
                }]
            });

        }

        // ==================== 全周期 vs 半周期对比图 ====================
        function renderCompareChart() {
            const dom = document.getElementById('compareChart');
            if (!dom) return;
            const chart = echarts.init(dom);

            const totalTce = getPeriodSum('electricity') * COEF.electricity + getPeriodSum('water') * COEF.water + getPeriodSum('steam') * COEF.steam;
            const fullData = STRUCTURE_DATA.fullCycle.processes;
            const halfData = STRUCTURE_DATA.secondHalf.processes;

            const names = fullData.map(p => p.name);
            const fullValues = fullData.map(p => +(totalTce * p.pct / 100).toFixed(2));
            const halfValues = halfData.map(p => +(totalTce * p.pct / 100).toFixed(2));

            chart.setOption({
                tooltip: { trigger: 'axis', axisPointer: { type: 'shadow' } },

                grid: { left: '3%', right: '4%', bottom: '3%', containLabel: true },
                xAxis: { type: 'category', data: names, axisLabel: { rotate: 30, fontSize: 10 } },
                yAxis: { type: 'value', name: 'tce' },
                series: [
                    { name: '全周期综合能耗', type: 'bar', data: fullValues, itemStyle: { color: '#1e80ff' }, barWidth: '40%' },
                    { name: '7-12月综合能耗', type: 'bar', data: halfValues, itemStyle: { color: '#ff7d00' }, barWidth: '40%' }
                ]
            });

        // ==================== 能耗结构树状层级表 ====================
        function renderTreeTable() {
            const totalTce = getPeriodSum('electricity') * COEF.electricity + getPeriodSum('water') * COEF.water + getPeriodSum('steam') * COEF.steam;

            const rows = [
                {
                    id: 'root', level: 0, l1: '公司能耗结构', l2: '全周期综合能耗', l3: '', tce: totalTce, pct: 100, change: null, anomaly: false,
                    children: STRUCTURE_DATA.fullCycle.processes.map(p => ({
                        id: 'fc_' + p.name, level: 1, l1: '', l2: '', l3: p.name,
                        tce: totalTce * p.pct / 100, pct: p.pct, change: null, anomaly: false
                    }))
                },
                {
                    id: 'sh', level: 0, l1: '公司能耗结构', l2: '7-12月综合能耗', l3: '', tce: totalTce * 0.4635, pct: 46.35, change: null, anomaly: false,
                    children: STRUCTURE_DATA.secondHalf.processes.map(p => ({
                        id: 'sh_' + p.name, level: 1, l1: '', l2: '', l3: p.name,
                        tce: totalTce * p.pct / 100, pct: p.pct, change: p.change, anomaly: p.anomaly
                    }))
                },
                {
                    id: 'steam', level: 0, l1: '公司能耗结构', l2: '7-12月蒸汽消耗', l3: '', tce: getPeriodSum('steam') * COEF.steam * 0.5, pct: null, change: null, anomaly: false,
                    children: STRUCTURE_DATA.steamSecondHalf.processes.map(p => ({
                        id: 'st_' + p.name, level: 1, l1: '', l2: '', l3: p.name,
                        tce: getPeriodSum('steam') * COEF.steam * 0.5 * p.pct / 100, pct: p.pct, change: null, anomaly: false
                    }))
                },
                {
                    id: 'boiler', level: 0, l1: '公司能耗结构', l2: '7-12月锅炉能耗', l3: '', tce: null, pct: null, change: null, anomaly: false,
                    children: STRUCTURE_DATA.boilerSecondHalf.sources.map(p => ({
                        id: 'bl_' + p.name, level: 1, l1: '', l2: '', l3: p.name,
                        tce: null, pct: p.pct, change: null, anomaly: false
                    }))
                }
            ];

            let html = '';
            let rid = 0;

            function renderRows(items, parentId) {
                items.forEach(item => {
                    const id = 'tr_' + (rid++);
                    const hasChildren = item.children && item.children.length > 0;
                    const cls = 'level-' + item.level;
                    const isParent = item.level === 0;

                    html += '<tr class="' + cls + '" data-id="' + id + '"' + (parentId ? ' data-parent="' + parentId + '" style="display:none;"' : '') + '>';
                    html += '<td class="text-center">' + (hasChildren ? '<span class="expand-icon" onclick="toggleTreeRow(\'' + id + '\')">▶</span>' : '') + '</td>';
                    html += '<td class="fw-600">' + item.l1 + '</td>';
                    html += '<td class="' + (isParent ? 'fw-600' : '') + '">' + item.l2 + '</td>';
                    html += '<td>' + item.l3 + '</td>';
                    html += '<td class="text-right ' + (isParent ? 'fw-600' : '') + '">' + (item.tce != null ? fmtNum(item.tce, 2) : '-') + '</td>';
                    html += '<td class="text-right">' + (item.pct != null ? fmtNum(item.pct, 2) + '%' : '-') + '</td>';
                    html += '<td class="text-center">';
                    if (item.change != null) {
                        const cls2 = item.anomaly ? 'text-red' : (Math.abs(item.change) > 3 ? 'text-red' : 'text-green');
                        html += '<span class="' + cls2 + '">' + (item.change > 0 ? '+' : '') + fmtNum(item.change, 2) + '%</span>';
                    } else { html += '-'; }
                    html += '</td>';
                    html += '<td class="text-center">';
                    if (item.anomaly) {
                        html += '<span class="tag tag-red">异常预警（↑）</span>';
                    } else if (item.l3 === '锅炉' && item.tce === 0) {
                        html += '<span class="tag tag-gray">无数据/需关注</span>';
                    } else if (item.l3 && item.change !== null && item.change !== undefined) {
                        html += '<span class="tag tag-green">正常</span>';
                    } else if (item.l3 === '灌装工序二线' && item.l2 === '7-12月蒸汽消耗') {
                        html += '<span class="tag tag-orange">趋势异常（偏高）</span>';
                    } else {
                        html += '<span class="tag tag-green">正常</span>';
                    }
                    html += '</td>';
                    html += '</tr>';

                    if (hasChildren) {
                        renderRows(item.children, id);
                    }
                });
            }

            renderRows(rows, null);
            document.getElementById('treeBody').innerHTML = html;
        }

        function toggleTreeRow(id) {
            const icon = document.querySelector('#treeBody tr[data-id="' + id + '"] .expand-icon');
            if (!icon) return;
            const isExpanded = icon.classList.contains('expanded');
            const children = document.querySelectorAll('#treeBody tr[data-parent="' + id + '"]');

            if (isExpanded) {
                icon.classList.remove('expanded');
                children.forEach(r => { r.style.display = 'none'; collapseTreeChildren(r); });
            } else {
                icon.classList.add('expanded');
                children.forEach(r => { r.style.display = ''; });
            }
        }

        function collapseTreeChildren(row) {
            const childIcon = row.querySelector('.expand-icon');
            if (childIcon && childIcon.classList.contains('expanded')) {
                childIcon.classList.remove('expanded');
                const id = row.getAttribute('data-id');
                document.querySelectorAll('#treeBody tr[data-parent="' + id + '"]').forEach(r => {
                    r.style.display = 'none';
                    collapseTreeChildren(r);
                });
            }
        }

        function expandAllTree() {
            document.querySelectorAll('#treeBody .expand-icon').forEach(icon => icon.classList.add('expanded'));
            document.querySelectorAll('#treeBody tr[data-parent]').forEach(r => r.style.display = '');
        }

        function collapseAllTree() {
            document.querySelectorAll('#treeBody .expand-icon').forEach(icon => icon.classList.remove('expanded'));
            document.querySelectorAll('#treeBody tr[data-parent]').forEach(r => r.style.display = 'none');
        }

        // ==================== 月度综合能耗趋势 ====================
        function renderMonthlyTrendChart() {
            const dom = document.getElementById('monthlyTrendChart');
            if (!dom) return;
            const chart = echarts.init(dom);

            const d = getData();
            const labels = d.production.months.slice(0, getMonthCount());
            const elecTce = d.electricity.map(v => +(v * COEF.electricity).toFixed(2));
            const waterTce = d.water.map(v => +(v * COEF.water).toFixed(2));
            const steamTce = d.steam.map(v => +(v * COEF.steam).toFixed(2));
            const totalTce = elecTce.map((v, i) => +(v + waterTce[i] + steamTce[i]).toFixed(2));

            chart.setOption({
                tooltip: { trigger: 'axis' },
                legend: { data: ['电力折标煤', '水折标煤', '蒸汽折标煤', '综合能耗'], top: 0 },
                grid: { left: '3%', right: '4%', bottom: '3%', containLabel: true },
                xAxis: { type: 'category', data: labels },
                yAxis: { type: 'value', name: 'tce' },
                series: [
                    { name: '电力折标煤', type: 'bar', stack: 'stack', data: elecTce, itemStyle: { color: '#1e80ff' }, barWidth: '50%' },
                    { name: '水折标煤', type: 'bar', stack: 'stack', data: waterTce, itemStyle: { color: '#14c9c9' } },
                    { name: '蒸汽折标煤', type: 'bar', stack: 'stack', data: steamTce, itemStyle: { color: '#ff7d00' } },
                    { name: '综合能耗', type: 'line', data: totalTce, itemStyle: { color: '#f53f3f' }, lineStyle: { width: 2 }, symbol: 'circle', symbolSize: 6 }
                ]
            });
            window.addEventListener('resize', () => chart.resize());
        }

        // ==================== 单位产品综合能耗趋势 ====================
        function renderUnitTrendChart() {
            const dom = document.getElementById('unitTrendChart');
            if (!dom) return;
            const chart = echarts.init(dom);

            const d = getData();
            const labels = d.production.months.slice(0, getMonthCount());
            const unitTce = d.electricity.map((v, i) => {
                const total = v * COEF.electricity + d.water[i] * COEF.water + d.steam[i] * COEF.steam;
                return d.production.actualOutput[i] > 0 ? +(total / d.production.actualOutput[i]).toFixed(4) : 0;
            });

            const avgLine = unitTce.reduce((a, b) => a + b, 0) / unitTce.length;

            chart.setOption({
                tooltip: { trigger: 'axis', formatter: function(p) { return p[0].name + '<br/>单位产品综合能耗: ' + fmtNum(p[0].value, 4) + ' tce/t'; } },
                grid: { left: '3%', right: '4%', bottom: '3%', containLabel: true },
                xAxis: { type: 'category', data: labels },
                yAxis: { type: 'value', name: 'tce/t' },
                series: [
                    {
                        name: '单位产品综合能耗', type: 'bar', data: unitTce,
                        itemStyle: {
                            color: function(p) {
                                return p.value > avgLine ? '#f53f3f' : '#00b42a';
                            }
                        }, barWidth: '50%'
                    },
                    {
                        name: '平均值', type: 'line', data: new Array(unitTce.length).fill(+avgLine.toFixed(4)),
                        lineStyle: { type: 'dashed', color: '#ff7d00', width: 2 },
                        symbol: 'none'
                    }
                ]
            });
            window.addEventListener('resize', () => chart.resize());
        }

        // ==================== 导出CSV ====================
        function exportTable(tableId) {
            const table = document.getElementById(tableId);
            let csv = '\uFEFF';
            const rows = table.querySelectorAll('tr');
            rows.forEach(row => {
                const cols = row.querySelectorAll('th, td');
                const rowData = [];
                cols.forEach(col => {
                    let text = col.textContent.trim().replace(/"/g, '""');
                    rowData.push('"' + text + '"');
                });
                csv += rowData.join(',') + '\n';
            });
            const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = tableId + '_' + currentYear + '_' + currentPeriod + '.csv';
            a.click();
            URL.revokeObjectURL(url);
        }

        // ==================== 初始化 ====================
        document.addEventListener('DOMContentLoaded', function() {
            refreshAll();
        });
