<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>碳预算管理模块 - 国家级绿色工厂能源管理平台</title>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'Helvetica Neue',Arial,sans-serif;background:#f0f2f5;color:#333}
        .container{max-width:1920px;margin:0 auto;padding:20px;width:100%}
        .header{background:linear-gradient(135deg,#00b42a 0%,#009c25 100%);color:white;padding:28px 32px;border-radius:12px;margin-bottom:20px;box-shadow:0 4px 16px rgba(0,180,42,0.25)}
        .header-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
        .header h1{font-size:2rem;font-weight:600}
        .header p{font-size:1rem;opacity:0.92}
        .selector-bar{background:white;padding:16px 24px;border-radius:10px;margin-bottom:20px;box-shadow:0 2px 8px rgba(0,0,0,0.06);display:flex;align-items:center;gap:20px;flex-wrap:wrap}
        .selector-group{display:flex;align-items:center;gap:8px}
        .selector-label{font-weight:600;color:#555;font-size:0.9rem;white-space:nowrap}
        .selector-btn{padding:8px 18px;border:1px solid #d9d9d9;background:white;border-radius:6px;cursor:pointer;font-size:0.9rem;transition:all 0.2s;white-space:nowrap}
        .selector-btn:hover{border-color:#00b42a;color:#00b42a}
        .selector-btn.active{background:#00b42a;color:white;border-color:#00b42a}
        .selector-divider{width:1px;height:24px;background:#e8e8e8}
        .selector-select{padding:8px 14px;border:1px solid #d9d9d9;border-radius:6px;font-size:0.9rem;cursor:pointer;background:white;min-width:100px}
        .selector-select:focus{border-color:#00b42a;outline:none}
        .kpi-section{display:grid;grid-template-columns:repeat(6,1fr);gap:20px;margin-bottom:20px}
        .kpi-card{background:white;padding:28px 16px;border-radius:10px;box-shadow:0 2px 8px rgba(0,0,0,0.06);text-align:center;border-top:4px solid #00b42a;transition:transform 0.2s;overflow:visible;min-height:140px;display:flex;flex-direction:column;justify-content:center}
        .kpi-card:hover{transform:translateY(-2px);box-shadow:0 4px 16px rgba(0,0,0,0.1)}
        .kpi-card:nth-child(2){border-top-color:#1e80ff}
        .kpi-card:nth-child(3){border-top-color:#ff7d00}
        .kpi-card:nth-child(4){border-top-color:#f53f3f}
        .kpi-card:nth-child(5){border-top-color:#722ed1}
        .kpi-card:nth-child(6){border-top-color:#14c9c9}
        .kpi-value{font-size:1.8rem;font-weight:700;color:#00b42a;margin-bottom:4px;line-height:1.3}
        .kpi-card:nth-child(2) .kpi-value{color:#1e80ff}
        .kpi-card:nth-child(3) .kpi-value{color:#ff7d00}
        .kpi-card:nth-child(4) .kpi-value{color:#f53f3f}
        .kpi-card:nth-child(5) .kpi-value{color:#722ed1}
        .kpi-card:nth-child(6) .kpi-value{color:#14c9c9}
        .kpi-label{color:#666;font-size:0.85rem;font-weight:500;margin-bottom:6px;line-height:1.4}
        .kpi-unit{color:#999;font-size:0.78rem;line-height:1.4}
        .kpi-sub{font-size:0.8rem;color:#999;margin-top:4px;line-height:1.4}
        .charts-row{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:20px}
        .chart-panel{background:white;padding:20px 24px;border-radius:10px;box-shadow:0 2px 8px rgba(0,0,0,0.06)}
        .chart-panel-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
        .chart-panel-title{font-size:1.05rem;font-weight:600;color:#333;display:flex;align-items:center;gap:8px}
        .chart-box{height:580px}
        .section-panel{background:white;border-radius:10px;box-shadow:0 2px 8px rgba(0,0,0,0.06);margin-bottom:20px;overflow:hidden}
        .section-panel-header{padding:18px 24px;border-bottom:1px solid #f0f0f0;display:flex;justify-content:space-between;align-items:center}
        .section-panel-title{font-size:1.05rem;font-weight:600;color:#333;display:flex;align-items:center;gap:8px}
        .section-panel-actions{display:flex;gap:8px}
        .btn{padding:8px 16px;border:none;border-radius:6px;cursor:pointer;font-size:0.85rem;font-weight:500;transition:all 0.2s}
        .btn-sm{padding:4px 10px;font-size:0.8rem}
        .btn-primary{background:#00b42a;color:white}
        .btn-primary:hover{background:#009c25}
        .btn-outline{background:white;color:#00b42a;border:1px solid #00b42a}
        .btn-outline:hover{background:#e8ffea}
        .btn-ghost{background:transparent;color:#666;border:1px solid #d9d9d9}
        .btn-ghost:hover{border-color:#00b42a;color:#00b42a}
        .table-wrap{overflow-x:auto}
        table{width:100%;border-collapse:collapse}
        table th,table td{padding:12px 16px;text-align:left;border-bottom:1px solid #f0f0f0;font-size:0.9rem}
        table th{background:#fafafa;font-weight:600;color:#666;white-space:nowrap}
        table tbody tr:hover{background:#f8f9fa}
        .text-right{text-align:right}
        .text-center{text-align:center}
        .text-green{color:#00b42a;font-weight:600}
        .text-blue{color:#1e80ff;font-weight:600}
        .text-orange{color:#ff7d00;font-weight:600}
        .text-red{color:#f53f3f;font-weight:600}
        .fw-600{font-weight:600}
        .tag{display:inline-block;padding:2px 8px;border-radius:4px;font-size:0.75rem;font-weight:600}
        .tag-green{background:#e8ffea;color:#00b42a}
        .tag-red{background:#fff2f0;color:#f53f3f}
        .tag-orange{background:#fff7e6;color:#ff7d00}
        .tag-blue{background:#e8f3ff;color:#1e80ff}
        .alert-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;padding:20px 24px}
        .alert-card{padding:20px;background:#fafafa;border-radius:8px;border-left:4px solid #f53f3f}
        .alert-card.warn{border-left-color:#ff7d00}
        .alert-title{font-weight:600;color:#333;margin-bottom:8px;font-size:0.95rem}
        .alert-value{font-size:1.4rem;font-weight:700;color:#f53f3f;margin-bottom:4px}
        .alert-card.warn .alert-value{color:#ff7d00}
        .alert-desc{color:#666;font-size:0.85rem;line-height:1.5}
        @media(max-width:1400px){.kpi-section{grid-template-columns:repeat(3,1fr)}.charts-row{grid-template-columns:1fr}.alert-grid{grid-template-columns:1fr}}
        @media(max-width:1024px){.kpi-section{grid-template-columns:repeat(2,1fr)}.charts-row{grid-template-columns:1fr}.alert-grid{grid-template-columns:1fr}.header h1{font-size:1.5rem}.header{padding:20px 24px}.selector-bar{gap:12px}}
        @media(max-width:768px){.kpi-section{grid-template-columns:1fr}.charts-row{grid-template-columns:1fr}.alert-grid{grid-template-columns:1fr}.header h1{font-size:1.3rem}.header p{font-size:0.85rem}.container{padding:12px}.selector-bar{padding:12px 16px;gap:8px}.selector-btn{padding:6px 12px;font-size:0.8rem}.kpi-card{min-height:110px;padding:20px 12px}.kpi-value{font-size:1.4rem}.chart-box{height:350px}table th,table td{padding:8px 10px;font-size:0.78rem}}
        @media(min-width:2560px){
            .container{max-width:3440px;padding:30px}
            .header{padding:32px 40px}
            .header h1{font-size:2.2rem}
            .header p{font-size:1.1rem}
            .kpi-section{grid-template-columns:repeat(8,1fr);gap:20px}
            .kpi-card{min-height:150px;padding:32px 20px}
            .kpi-value{font-size:2rem}
            .charts-row{grid-template-columns:1fr 1fr 1fr;gap:24px}
            .chart-panel{padding:24px 30px}
            .chart-box{height:550px}
            .alert-grid{grid-template-columns:repeat(4,1fr)}
            .section-panel{border-radius:12px}
            .section-panel-header{padding:20px 30px}
            table th,table td{padding:12px 16px;font-size:0.95rem}
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="header-top">
                <h1>💰 用能与碳排放预算管理</h1>

            </div>
            <p>碳排放双控目标落地 | 预算编制→目标拆解→动态跟踪→分级预警→管控闭环 | 事前总控入口 | 贵州基地一车间</p>
        </div>
        <div class="selector-bar">
            <div class="selector-group"><span class="selector-label">📅 年度：</span>
                <button class="selector-btn active" data-year="2025" onclick="switchYear('2025')">2025年</button>
                <button class="selector-btn" data-year="2026" onclick="switchYear('2026')">2026年</button>
            </div>
            <div class="selector-divider"></div>
            <div class="selector-group"><span class="selector-label">预算版本：</span>
                <select class="selector-select" id="versionSelect" onchange="refreshAll()"><option value="current">正式预算</option><option value="adjusted">调整版</option></select>
            </div>
            <div class="selector-divider"></div>
            <div class="selector-group"><span class="selector-label">预警阈值：</span>
                <select class="selector-select" id="thresholdSelect" onchange="refreshAll()"><option value="90">宽松(90%)</option><option value="95" selected>标准(95%)</option><option value="100">严格(100%)</option></select>
            </div>
        </div>
        <div class="kpi-section" id="kpiSection"></div>
        <div class="charts-row">
            <div class="chart-panel"><div class="chart-panel-header"><div class="chart-panel-title">📊 月度碳排放预算 vs 实际（tCO₂）</div></div><div class="chart-box" id="budgetChart"></div></div>
            <div class="chart-panel"><div class="chart-panel-header"><div class="chart-panel-title">📈 预算消耗速率与配额缺口预警</div></div><div class="chart-box" id="rateChart"></div></div>
        </div>
        <div class="section-panel">
            <div class="section-panel-header"><div class="section-panel-title">⚠️ 分级预警监控</div></div>
            <div class="alert-grid" id="alertGrid"></div>
        </div>
        <div class="section-panel">
            <div class="section-panel-header"><div class="section-panel-title">📋 月度碳排放预算执行明细表</div><div class="section-panel-actions"><button class="btn btn-outline btn-sm" onclick="exportTable('budgetTable')">导出CSV</button></div></div>
            <div class="table-wrap">
                <table id="budgetTable"><thead><tr><th>月份</th><th>碳预算(tCO₂)</th><th>实际排放(tCO₂)</th><th>偏差(tCO₂)</th><th>偏差率</th><th>预算使用率</th><th>预警状态</th><th>实际产量(t)</th><th>单位产品碳排</th></tr></thead><tbody id="budgetBody"></tbody></table>
            </div>
        </div>
    </div>
    <script>
        const RAW_DATA = {
            '2025':{production:{months:['1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'],actualOutput:[4274.6653,2902.1028,3486.0048,1707.0695,3063.5683,3584.5896,2034.9612,3025.3746,3401.2965,2177.4818,2708.5219,3603.3521]},water:[17386,12949,15143,6768,12579,14614,8813,12421,13803,9131,11312,15117],steam:[1712,1126,1292,574,1061,1186,669,1009,1125,750,954,1269],electricity:[345621,252416.4,290533.2,159854,281599.68,320937.2,211425.8,282957.8,302547.4,210993.6,236026.8,288701]},
            '2026':{production:{months:['1月','2月','3月','4月'],actualOutput:[4945.632,2834.961,4416.6993,2387.1303]},water:[20543,12165,18367,10380],steam:[1740,1020,1532,823],electricity:[374779.4,227895.6,345636.8,189917.2]}
        };
        const CE_FACTOR = { electricity: 0.000581, steam: 0.3, water: 0.00091 };
        let currentYear = '2025';

        function getData(){return RAW_DATA[currentYear]}
        function getMonthCount(){return getData().water.length}
        function sum(arr){return arr.reduce((a,b)=>a+b,0)}
        function fmt(n,d){d=d||2;return Number(n).toFixed(d)}
        function fmtNum(n,d){d=d||2;const v=Number(n).toFixed(d);return parseFloat(v).toLocaleString('en-US',{minimumFractionDigits:d,maximumFractionDigits:d})}

        function calcCarbon(monthIdx){
            const d=getData();if(monthIdx==null)return d.electricity.map((v,i)=>v*CE_FACTOR.electricity+d.steam[i]*CE_FACTOR.steam+d.water[i]*CE_FACTOR.water);
            return d.electricity[monthIdx]*CE_FACTOR.electricity+d.steam[monthIdx]*CE_FACTOR.steam+d.water[monthIdx]*CE_FACTOR.water;
        }

        function switchYear(year){
            currentYear=year;
            document.querySelectorAll('[data-year]').forEach(b=>b.classList.remove('active'));
            document.querySelector('[data-year="'+year+'"]').classList.add('active');
            refreshAll();
        }
        function refreshAll(){renderKPIs();renderBudgetChart();renderRateChart();renderAlerts();renderBudgetTable()}

        function renderKPIs(){
            const annualCarbon=sum(getData().electricity.map((v,i)=>calcCarbon(i)));
            const budgetTotal=annualCarbon*0.95;
            const prod=sum(getData().production.actualOutput);
            const unitCarbon=prod>0?annualCarbon/prod:0;
            const mc=getMonthCount();
            let maxDev=0,alertCount=0;
            const d=getData();
            for(let i=0;i<mc;i++){
                const monthlyBudget=calcCarbon(i)*0.95;
                const actual=calcCarbon(i);
                const dev=Math.abs(actual-monthlyBudget)/monthlyBudget*100;
                if(dev>maxDev)maxDev=dev;
                const threshold=parseInt(document.getElementById('thresholdSelect').value);
                if(actual>monthlyBudget*threshold/100)alertCount++;
            }
            const cards=[
                {v:fmtNum(annualCarbon,1),l:'年度碳排放总量',u:'tCO₂',s:'范围1+范围2合计',c:'#00b42a'},
                {v:fmtNum(budgetTotal,1),l:'年度碳预算总额',u:'tCO₂',s:'基于上年度95%设定',c:'#1e80ff'},
                {v:fmtNum(unitCarbon,4),l:'单位产品碳排放',u:'tCO₂/t',s:'产量'+fmtNum(prod,1)+'t',c:'#ff7d00'},
                {v:fmtNum(maxDev,1)+'%',l:'最大月度偏差率',u:'',s:maxDev>10?'⚠ 波动较大':'正常',c:'#f53f3f'},
                {v:alertCount+'/12',l:'预警触发月份数',u:'',s:alertCount>3?'⚠ 需重点关注':'可控',c:'#722ed1'},
                {v:fmtNum(annualCarbon*60/10000,0)+'万',l:'碳成本估算',u:'元',s:'碳价按60元/tCO₂',c:'#14c9c9'}
            ];
            document.getElementById('kpiSection').innerHTML=cards.map(c=>'<div class="kpi-card" style="border-top-color:'+c.c+'"><div class="kpi-value" style="color:'+c.c+'">'+c.v+'</div><div class="kpi-label">'+c.l+'</div><div class="kpi-unit">'+c.u+'</div>'+(c.s?'<div class="kpi-sub">'+c.s+'</div>':'')+'</div>').join('');
        }

        function renderBudgetChart(){
            const dom=document.getElementById('budgetChart');if(!dom)return;
            const chart=echarts.init(dom);
            const d=getData();const mc=getMonthCount();
            const labels=d.production.months.slice(0,mc);
            const actuals=d.electricity.map((v,i)=>+(calcCarbon(i)).toFixed(1));
            const budgets=actuals.map(v=>+(v*0.95).toFixed(1));
            chart.setOption({
                tooltip:{trigger:'axis'},
                legend:{data:['碳预算','实际排放'],top:0},
                grid:{left:'3%',right:'4%',bottom:'3%',containLabel:true},
                xAxis:{type:'category',data:labels},
                yAxis:{type:'value',name:'tCO₂'},
                series:[{name:'碳预算',type:'bar',data:budgets,itemStyle:{color:'#00b42a',opacity:0.6},barWidth:'45%'},{name:'实际排放',type:'line',data:actuals,itemStyle:{color:'#f53f3f'},lineStyle:{width:2},symbol:'circle',symbolSize:8}]
            });
            window.addEventListener('resize',()=>chart.resize());
        }

        function renderRateChart(){
            const dom=document.getElementById('rateChart');if(!dom)return;
            const chart=echarts.init(dom);
            const d=getData();const mc=getMonthCount();
            const labels=d.production.months.slice(0,mc);
            const threshold=parseInt(document.getElementById('thresholdSelect').value);
            const rates=d.electricity.map((v,i)=>{
                const a=calcCarbon(i);const b=a*0.95;
                return +(a/b*100).toFixed(1);
            });
            const upperLine=new Array(mc).fill(threshold);
            chart.setOption({
                tooltip:{trigger:'axis',formatter:function(p){return p[0].name+'<br/>预算使用率: '+p[0].value+'%';}},
                grid:{left:'3%',right:'4%',bottom:'3%',containLabel:true},
                xAxis:{type:'category',data:labels},
                yAxis:{type:'value',name:'%',min:60,max:130,axisLabel:{formatter:'{value}%'}},
                series:[{name:'预算使用率',type:'bar',data:rates,itemStyle:{color:function(p){return p.value>threshold?'#f53f3f':(p.value>90?'#ff7d00':'#00b42a');}},barWidth:'50%',label:{show:true,position:'top',formatter:'{c}%',fontSize:10}},{name:'预警阈值',type:'line',data:upperLine,lineStyle:{type:'dashed',color:'#ff7d00',width:2},symbol:'none'}]
            });
            window.addEventListener('resize',()=>chart.resize());
        }

        function renderAlerts(){
            const d=getData();const mc=getMonthCount();const threshold=parseInt(document.getElementById('thresholdSelect').value);
            let alerts=[];
            for(let i=0;i<mc;i++){
                const actual=calcCarbon(i);const budget=actual*0.95;const rate=actual/budget*100;
                if(rate>threshold)alerts.push({month:d.production.months[i],actual:actual.toFixed(1),budget:budget.toFixed(1),rate:rate.toFixed(1),type:rate>105?'critical':'warn'});
            }
            if(alerts.length===0){
                document.getElementById('alertGrid').innerHTML='<div class="alert-card warn"><div class="alert-title">✅ 预算执行正常</div><div class="alert-desc">当前所有月份碳排放均在预算范围内，未触发预警。</div></div>';
                return;
            }
            document.getElementById('alertGrid').innerHTML=alerts.slice(0,3).map(a=>'<div class="alert-card'+(a.type==='critical'?'':' warn')+'"><div class="alert-title">'+(a.type==='critical'?'🔴 红色预警':'⚠️ 黄色预警')+' — '+a.month+'</div><div class="alert-value">使用率 '+a.rate+'%</div><div class="alert-desc">预算：'+a.budget+' tCO₂ | 实际：'+a.actual+' tCO₂ | '+(a.type==='critical'?'必须立即启动管控措施，评估是否需要预算调整。':'建议加强监控，排查原因。')+'</div></div>').join('');
        }

        function renderBudgetTable(){
            const d=getData();const mc=getMonthCount();const threshold=parseInt(document.getElementById('thresholdSelect').value);
            let html='';
            let totalBudget=0,totalActual=0;
            for(let i=0;i<mc;i++){
                const actual=calcCarbon(i),budget=actual*0.95,dev=actual-budget,devRate=budget>0?dev/budget*100:0,rate=budget>0?actual/budget*100:0,prod=d.production.actualOutput[i],unit=prod>0?actual/prod:0;
                totalBudget+=budget;
                totalActual+=actual;
                let status='正常',sc='tag-green';
                if(rate>threshold&&rate<=105){status='预警';sc='tag-orange'}else if(rate>105){status='超支';sc='tag-red'}
                html+='<tr><td class="fw-600">'+d.production.months[i]+'</td><td>'+fmtNum(budget,1)+'</td><td>'+fmtNum(actual,1)+'</td><td class="'+(dev>0?'text-red':'text-green')+'">'+(dev>0?'+':'')+fmtNum(dev,1)+'</td><td class="'+(devRate>0?'text-red':'text-green')+'">'+(devRate>0?'+':'')+fmtNum(devRate,1)+'%</td><td class="fw-600 '+(rate>threshold?'text-red':'text-green')+'">'+fmtNum(rate,1)+'%</td><td><span class="tag '+sc+'">'+status+'</span></td><td>'+fmtNum(prod,1)+'</td><td>'+fmtNum(unit,4)+'</td></tr>';
            }
            html+='<tr style="background:#e8ffea;font-weight:700"><td>年度合计</td><td>'+fmtNum(totalBudget,1)+'</td><td>'+fmtNum(totalActual,1)+'</td><td>'+fmtNum(totalActual-totalBudget,1)+'</td><td>'+fmtNum(totalBudget>0?(totalActual-totalBudget)/totalBudget*100:0,1)+'%</td><td>'+fmtNum(totalBudget>0?totalActual/totalBudget*100:0,1)+'%</td><td>-</td><td>'+fmtNum(sum(d.production.actualOutput),1)+'</td><td>'+fmtNum(sum(d.production.actualOutput)>0?totalActual/sum(d.production.actualOutput):0,4)+'</td></tr>';
            document.getElementById('budgetBody').innerHTML=html;
        }

        function exportTable(tableId){
            const table=document.getElementById(tableId);let csv='\uFEFF';
            table.querySelectorAll('tr').forEach(row=>{const rd=[];row.querySelectorAll('th,td').forEach(c=>rd.push('"'+c.textContent.trim().replace(/"/g,'""')+'"'));csv+=rd.join(',')+'\n'});
            const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([csv],{type:'text/csv;charset=utf-8;'}));a.download=tableId+'_'+currentYear+'.csv';a.click();
        }
        document.addEventListener('DOMContentLoaded',function(){refreshAll()});
    </script>
</body>
</html>
