            window.addEventListener('resize',()=>chart.resize());
        }

        function exportTable(tableId){const table=document.getElementById(tableId);let csv='\uFEFF';table.querySelectorAll('tr').forEach(row=>{const rd=[];row.querySelectorAll('th,td').forEach(c=>rd.push('"'+c.textContent.trim().replace(/"/g,'""')+'"'));csv+=rd.join(',')+'\n'});const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([csv],{type:'text/csv;charset=utf-8;'}));const dateStart=document.getElementById('dateStart').value;const dateEnd=document.getElementById('dateEnd').value;const suffix=dateStart&&dateEnd?dateStart+'_'+dateEnd:currentYear+'_'+(currentMonth==='all'?'全年':currentMonth+'月');a.download=tableId+'_'+suffix+'.csv';a.click();}

        const ENERGY_LEVELS={'total':{name:'全厂总表',columns:['日期','用电量(kWh)','用水量(m³)','用汽量(t)','用气量(m³)','综合能耗(tce)','实际产量(t)','vs昨日','vs月均']},'region':{name:'区域/产线分表',columns:['区域/产线','用电量(kWh)','用水量(m³)','用汽量(t)','用气量(m³)','综合能耗(tce)','占比'],'data':[{'name':'生产区','elec':85,'water':70,'steam':90,'gas':80,'tce':86},{'name':'办公区','elec':10,'water':20,'steam':5,'gas':15,'tce':8},{'name':'辅助生产系统','elec':5,'water':10,'steam':5,'gas':5,'tce':6}]},'equipment':{name:'设备/位置子表',columns:['设备/位置','用电量(kWh)','用水量(m³)','用汽量(t)','用气量(m³)','所属区域'],'data':[{'name':'灌装机','elec':25,'water':0,'steam':10,'gas':0,'region':'生产区'},{'name':'APV','elec':20,'water':0,'steam':40,'gas':0,'region':'生产区'},{'name':'中央空调','elec':30,'water':5,'steam':0,'gas':0,'region':'办公区'},{'name':'空压机','elec':10,'water':0,'steam':0,'gas':0,'region':'辅助生产系统'},{'name':'锅炉','elec':10,'water':15,'steam':40,'gas':80,'region':'辅助生产系统'},{'name':'制水间','elec':5,'water':80,'steam':5,'gas':15,'region':'生产区'}]}};

        function refreshDetailTable(){
            dataLevel=document.getElementById('levelSelect').value;
            renderTable();
        }

        function renderTable(){
            const d=getData();
            const mc=getMonthCount();
            const prodPerDay=currentMonth==='all'?avg(d.production.actualOutput)/30:d.production.actualOutput[parseInt(currentMonth)-1]/30;
            
            if(dataLevel!=='total'){
                const level=ENERGY_LEVELS[dataLevel];
                let html='';
                level.data.forEach(item=>{
                    const tce=item.elec*COEF.electricity*10000+item.water*COEF.water*1000+item.steam*COEF.steam+item.gas*COEF.gas*1000;
                    if(dataLevel==='region'){
                        html+='<tr><td class="fw-600">'+item.name+'</td><td class="text-right">'+fmtNum(item.elec*10000,0)+'</td><td class="text-right">'+fmtNum(item.water*1000,0)+'</td><td class="text-right">'+fmtNum(item.steam,0)+'</td><td class="text-right">'+fmtNum(item.gas*1000,0)+'</td><td class="text-right fw-600">'+fmtNum(tce,2)+'</td><td class="text-center"><span class="tag tag-blue">'+item.tce+'%</span></td></tr>';
                    }else{
                        html+='<tr><td class="fw-600">'+item.name+'</td><td class="text-right">'+fmtNum(item.elec*1000,0)+'</td><td class="text-right">'+fmtNum(item.water*100,0)+'</td><td class="text-right">'+fmtNum(item.steam,0)+'</td><td class="text-right">'+fmtNum(item.gas*100,0)+'</td><td class="text-center"><span class="tag tag-green">'+item.region+'</span></td></tr>';
                    }
                });
                document.getElementById('detailBody').innerHTML=html;
                const headers=dataLevel==='region'?['区域/产线','用电量(kWh)','用水量(m³)','用汽量(t)','用气量(m³)','综合能耗(tce)','占比']:['设备/位置','用电量(kWh)','用水量(m³)','用汽量(t)','用气量(m³)','所属区域'];
                document.querySelector('#detailTable thead tr').innerHTML=headers.map(h=>'<th>'+h+'</th>').join('');
                return;
            }
            
            document.querySelector('#detailTable thead tr').innerHTML='<th>日期</th><th>用电量(kWh)</th><th>用水量(m³)</th><th>用汽量(t)</th><th>用气量(m³)</th><th>综合能耗(tce)</th><th>实际产量(t)</th><th>vs昨日</th><th>vs月均</th>';

            const dateStart=document.getElementById('dateStart').value;
            const dateEnd=document.getElementById('dateEnd').value;
            
            if(dateStart&&dateEnd){
                const start=new Date(dateStart);
                const end=new Date(dateEnd);
                const startYear=start.getFullYear();
                const endYear=end.getFullYear();
                let html='';
                let totalElec=0,totalWater=0,totalSteam=0,totalGas=0,totalTce=0;
                let prevTce=null;
                
                for(let year=startYear;year<=endYear;year++){
                    const isCurrentYear=year.toString()===currentYear;
                    const yearData=year===2025?RAW_DATA['2025']:RAW_DATA['2026'];
                    const months=yearData.production.months;
                    const monthCount=Math.min(months.length, year===2026?4:12);
                    
                    for(let m=0;m<monthCount;m++){
                        const monthNum=m+1;
                        const monthStart=new Date(year, m, 1);
                        const monthEnd=new Date(year, m+1, 0);
                        
                        if(monthEnd<start||monthStart>end)continue;
                        
                        const elec=yearData.electricity[m];
                        const water=yearData.water[m];
                        const steam=yearData.steam[m];
                        const gas=yearData.gas[m];
                        const tce=elec*COEF.electricity+water*COEF.water+steam*COEF.steam+gas*COEF.gas;
                        const chg=prevTce!=null&&prevTce>0?((tce-prevTce)/prevTce*100):null;
                        prevTce=tce;
                        
                        totalElec+=elec;
                        totalWater+=water;
                        totalSteam+=steam;
                        totalGas+=gas;
                        totalTce+=tce;
                        
                        html+='<tr><td class="fw-600">'+year+'年'+months[m]+'</td><td class="text-right">'+fmtNum(elec,0)+'</td><td class="text-right">'+fmtNum(water,0)+'</td><td class="text-right">'+fmtNum(steam,0)+'</td><td class="text-right">'+fmtNum(gas,0)+'</td><td class="text-right fw-600">'+fmtNum(tce,2)+'</td><td class="text-right">'+fmtNum(yearData.production.actualOutput[m],1)+'</td><td class="text-center">'+(chg!=null?'<span class="tag '+(chg>0?'tag-red':'tag-green')+'">'+(chg>0?'+':'')+fmt(chg,1)+'%</span>':'-')+'</td><td class="text-center">-</td></tr>';
                    }
                }
                
                html+='<tr class="row-total"><td><strong>合计</strong></td><td class="text-right"><strong>'+fmtNum(totalElec,0)+'</strong></td><td class="text-right"><strong>'+fmtNum(totalWater,0)+'</strong></td><td class="text-right"><strong>'+fmtNum(totalSteam,0)+'</strong></td><td class="text-right"><strong>'+fmtNum(totalGas,0)+'</strong></td><td class="text-right"><strong>'+fmtNum(totalTce,2)+'</strong></td><td class="text-center">-</td><td class="text-center">-</td><td class="text-center">-</td></tr>';
                document.getElementById('detailBody').innerHTML=html;
                return;
            }

            if(currentMonth==='all'||energyType!=='electricity'){
                let html='';
                for(let i=0;i<mc;i++){
                    const tce=d.electricity[i]*COEF.electricity+d.water[i]*COEF.water+d.steam[i]*COEF.steam+d.gas[i]*COEF.gas;
                    const prevTce=i>0?(d.electricity[i-1]*COEF.electricity+d.water[i-1]*COEF.water+d.steam[i-1]*COEF.steam+d.gas[i-1]*COEF.gas):tce;
                    const chg=i>0&&prevTce>0?((tce-prevTce)/prevTce*100):null;
                    const allAvg=avg(d.electricity.map((v,j)=>v*COEF.electricity+d.water[j]*COEF.water+d.steam[j]*COEF.steam+d.gas[j]*COEF.gas));
                    const dChg=allAvg>0?((tce-allAvg)/allAvg*100):0;
                    html+='<tr><td class="fw-600">'+currentYear+'年'+d.production.months[i]+'</td><td class="text-right">'+fmtNum(d.electricity[i],0)+'</td><td class="text-right">'+fmtNum(d.water[i],0)+'</td><td class="text-right">'+fmtNum(d.steam[i],0)+'</td><td class="text-right">'+fmtNum(d.gas[i],0)+'</td><td class="text-right fw-600">'+fmtNum(tce,2)+'</td><td class="text-right">'+fmtNum(d.production.actualOutput[i],1)+'</td><td class="text-center">'+(chg!=null?'<span class="tag '+(chg>0?'tag-red':'tag-green')+'">'+(chg>0?'+':'')+fmt(chg,1)+'%</span>':'-')+'</td><td class="text-center"><span class="tag '+(dChg>0?'tag-red':'tag-green')+'">'+(dChg>0?'+':'')+fmt(dChg,1)+'%</span></td></tr>';
                }
                html+='<tr class="row-total"><td><strong>合计</strong></td><td class="text-right"><strong>'+fmtNum(sum(d.electricity),0)+'</strong></td><td class="text-right"><strong>'+fmtNum(sum(d.water),0)+'</strong></td><td class="text-right"><strong>'+fmtNum(sum(d.steam),0)+'</strong></td><td class="text-right"><strong>'+fmtNum(sum(d.gas),0)+'</strong></td><td class="text-right"><strong>'+fmtNum(sum(d.electricity)*COEF.electricity+sum(d.water)*COEF.water+sum(d.steam)*COEF.steam+sum(d.gas)*COEF.gas,2)+'</strong></td><td class="text-right"><strong>'+fmtNum(sum(d.production.actualOutput),1)+'</strong></td><td class="text-center">-</td><td class="text-center">-</td></tr>';
                document.getElementById('detailBody').innerHTML=html;
                return;
            }
            
            const dVals=getSelectedDailyValues();
            const aV=avg(dVals);
            let html='';
            const monthIdx=parseInt(currentMonth)-1;
            
            for(let i=0;i<dVals.length;i++){
                const val=dVals[i];
                const date=currentYear+'年'+(parseInt(currentMonth))+'月'+(i+1)+'日';
                const prev=i>0?dVals[i-1]:null;
                const dChg=val!=null&&prev!=null&&prev>0?((val-prev)/prev*100):null;
                const mChg=val!=null&&aV>0?((val-aV)/aV*100):null;
                const tce=val!=null?val*COEF.electricity:0;
                html+='<tr><td class="fw-600">'+date+'</td><td class="text-right '+(val!=null?'':'text-muted')+'">'+(val!=null?fmtNum(val,0):'-')+'</td><td class="text-right text-muted">-</td><td class="text-right text-muted">-</td><td class="text-right text-muted">-</td><td class="text-right">'+fmtNum(tce,2)+'</td><td class="text-right">'+fmtNum(prodPerDay,1)+'</td><td class="text-center">'+(dChg!=null?'<span class="tag '+(dChg>0?'tag-red':'tag-green')+'">'+(dChg>0?'+':'')+fmt(dChg,1)+'%</span>':'-')+'</td><td class="text-center">'+(mChg!=null?'<span class="tag '+(mChg>0?'tag-red':'tag-green')+'">'+(mChg>0?'+':'')+fmt(mChg,1)+'%</span>':'-')+'</td></tr>';
            }
            
            const validSum=dVals.filter(v=>v!=null).reduce((a,b)=>a+b,0);
            const gasVal=currentMonth==='all'?sum(d.gas):d.gas[monthIdx];
            html+='<tr class="row-total"><td><strong>'+currentYear+'年'+d.production.months[monthIdx]+'合计</strong></td><td class="text-right"><strong>'+fmtNum(validSum,0)+'</strong></td><td class="text-right"><strong>'+fmtNum(currentMonth==='all'?sum(d.water):d.water[monthIdx],0)+'</strong></td><td class="text-right"><strong>'+fmtNum(currentMonth==='all'?sum(d.steam):d.steam[monthIdx],0)+'</strong></td><td class="text-right"><strong>'+fmtNum(gasVal,0)+'</strong></td><td class="text-right"><strong>'+fmtNum(validSum*COEF.electricity+d.water[monthIdx]*COEF.water+d.steam[monthIdx]*COEF.steam+gasVal*COEF.gas,2)+'</strong></td><td class="text-right"><strong>'+fmtNum(getMonthProd(monthIdx),1)+'</strong></td><td class="text-center">-</td><td class="text-center">-</td></tr>';
            document.getElementById('detailBody').innerHTML=html;
        }

        document.addEventListener('DOMContentLoaded',function(){
            refreshAll();
            const now=new Date();
            document.getElementById('dateStart').value=now.getFullYear()+'-'+String(now.getMonth()+1).padStart(2,'0')+'-01';
            document.getElementById('dateEnd').value=now.getFullYear()+'-'+String(now.getMonth()+1).padStart(2,'0')+'-'+String(now.getDate()).padStart(2,'0');
        });
    </script>
</body>
</html>
